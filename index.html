<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#6B9FB0">
  <meta name="description" content="Devocional Julio 2026 — Un mes de intimidad con Dios">
  <title>Devocional Julio 2026 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>
/* ── VARIABLES ──────────────────────────────────────── */
:root{
  --glass:rgba(255,255,255,0.52);
  --glass-strong:rgba(255,255,255,0.72);
  --glass-tint:rgba(255,255,255,0.35);
  --glass-border:rgba(255,255,255,0.65);
  --glass-border-light:rgba(255,255,255,0.45);
  --glass-shadow:0 8px 36px rgba(0,0,0,0.07),inset 0 1px 0 rgba(255,255,255,0.88);
  --glass-shadow-hover:0 16px 48px rgba(0,0,0,0.10),inset 0 1px 0 rgba(255,255,255,0.9);
  --blur:blur(28px) saturate(165%);
  --blur-heavy:blur(44px) saturate(185%);
  --r-xl:24px;--r-lg:18px;--r-md:14px;--r-sm:10px;
  --text:#1C2B3A;--text-mid:#3D4E5E;--text-light:#8A9AAB;--text-xlight:#B0BEC8;
}

/* ── RESET ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
a{color:inherit;text-decoration:none}
button{font-family:'Poppins',sans-serif;cursor:pointer}

/* ── BODY — gradient blob background ─────────────────── */
body{
  font-family:'Poppins',sans-serif;
  color:var(--text);
  font-size:19px;   /* 15px × 1.3 */
  line-height:1.65;
  background-color:#DDD8D0;
  background-image:
    radial-gradient(ellipse at 6% 16%, rgba(107,158,138,.40) 0%,transparent 42%),
    radial-gradient(ellipse at 94% 10%, rgba(123,159,176,.34) 0%,transparent 38%),
    radial-gradient(ellipse at 78% 85%, rgba(181,122,114,.28) 0%,transparent 42%),
    radial-gradient(ellipse at 16% 88%, rgba(176,138,90,.24) 0%,transparent 38%),
    radial-gradient(ellipse at 50% 50%, rgba(240,235,230,.90) 0%,transparent 70%);
  background-attachment:fixed;
  min-height:100vh;
}

/* ── GLASS BASE ──────────────────────────────────────── */
.glass{
  background:var(--glass);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
}
.glass-strong{
  background:var(--glass-strong);
  backdrop-filter:var(--blur-heavy);
  -webkit-backdrop-filter:var(--blur-heavy);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
}

/* ── TYPOGRAPHY ──────────────────────────────────────── */
.serif{font-family:'Lora',serif}
.serif-italic{font-family:'Lora',serif;font-style:italic}
h1{font-family:'Lora',serif;font-size:clamp(28px,5vw,40px);color:var(--text);line-height:1.18}
h2{font-family:'Lora',serif;font-size:clamp(23px,4vw,30px);color:var(--text);line-height:1.22}
h3{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;color:var(--text)}
p{color:var(--text-mid);line-height:1.78;margin-bottom:16px;font-size:18px}
p:last-child{margin-bottom:0}
.label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}
.eyebrow{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase}

/* ── LAYOUT ──────────────────────────────────────────── */
.container{max-width:860px;margin:0 auto;padding:0 24px}

/* ── NAVIGATION ──────────────────────────────────────── */
.top-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(220,215,208,0.75);
  backdrop-filter:var(--blur-heavy);
  -webkit-backdrop-filter:var(--blur-heavy);
  border-bottom:1px solid rgba(255,255,255,0.5);
  box-shadow:0 1px 0 rgba(0,0,0,0.04);
}
.top-nav__inner{
  max-width:860px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;padding:0 24px;
}
.nav-brand{
  font-family:'Lora',serif;font-style:italic;
  font-size:22px;color:var(--text);font-weight:400;
}
.nav-brand span{
  font-family:'Poppins',sans-serif;font-style:normal;
  font-size:13px;color:var(--text-light);
  font-weight:500;margin-left:10px;letter-spacing:1px;text-transform:uppercase;
}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-link{
  padding:9px 18px;border-radius:10px;
  font-size:15px;font-weight:500;color:var(--text-mid);
  transition:all .15s;border:1px solid transparent;
}
.nav-link:hover{background:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.7)}
.nav-link.active{
  background:rgba(123,159,176,0.2);
  border-color:rgba(123,159,176,0.35);
  color:#5A8099;font-weight:600;
}

/* ── BREADCRUMB ──────────────────────────────────────── */
.breadcrumb{
  padding:18px 0 0;
  display:flex;align-items:center;gap:8px;
  font-size:15px;color:var(--text-light);flex-wrap:wrap;
}
.breadcrumb a{color:#7B9FB0;transition:color .15s;font-weight:500}
.breadcrumb a:hover{color:#5A8099}
.breadcrumb__sep{color:#C0B8B0;font-size:14px}

/* ── HERO ────────────────────────────────────────────── */
.hero{
  background:linear-gradient(135deg,#4A6F82 0%,#6B9FB0 50%,#7EAFBF 100%);
  padding:clamp(44px,7vw,72px) 0 clamp(40px,6vw,62px);
  color:white;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60px;right:-50px;
  width:280px;height:280px;border-radius:50%;
  background:rgba(255,255,255,.07);
}
.hero::after{
  content:'';position:absolute;bottom:-80px;left:-60px;
  width:320px;height:320px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.hero__inner{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 24px}
.hero__eyebrow{
  font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.65);margin-bottom:12px;
}
.hero__title{
  font-family:'Lora',serif;font-style:italic;
  font-size:clamp(34px,6vw,52px);
  color:white;margin-bottom:8px;line-height:1.12;
}
.hero__subtitle{font-size:17px;color:rgba(255,255,255,.75);margin-bottom:28px;line-height:1.5}
.hero__verse{
  font-family:'Lora',serif;font-style:italic;
  font-size:18px;color:rgba(255,255,255,.88);
  border-left:2px solid rgba(255,255,255,.4);
  padding-left:18px;margin-bottom:30px;line-height:1.65;
}
.hero__prog-label{
  font-size:14px;color:rgba(255,255,255,.72);
  display:flex;justify-content:space-between;margin-bottom:10px;
}
.hero__prog-label strong{color:white;font-weight:700}
.hero__prog-track{
  height:6px;background:rgba(255,255,255,.22);border-radius:3px;overflow:hidden;
}
.hero__prog-fill{
  height:100%;background:white;border-radius:3px;transition:width .5s ease;
}

/* ── TODAY CARD ──────────────────────────────────────── */
.today-card{
  border-radius:var(--r-xl);padding:24px 26px;
  margin:28px 0 24px;display:flex;align-items:flex-start;gap:18px;
  transition:box-shadow .2s;cursor:pointer;
}
.today-card:hover{box-shadow:var(--glass-shadow-hover)}
.today-card__badge{
  width:54px;height:54px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;
  background:rgba(255,255,255,0.6);
}
.today-card__meta{font-size:13px;color:var(--text-light);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.today-card__title{font-family:'Lora',serif;font-size:22px;color:var(--text);margin-bottom:5px;line-height:1.3}
.today-card__ref{font-size:15px;color:var(--text-light);margin-bottom:16px}
.today-card--done{border-color:rgba(107,158,138,0.4)!important}

/* ── SECTION HEADING ─────────────────────────────────── */
.section-heading{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:32px}
.section-heading h3{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}

/* ── CALENDAR ────────────────────────────────────────── */
.calendar{border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px}
.calendar__header{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,0.3)}
.calendar__dname{
  text-align:center;padding:11px 0;
  font-size:13px;font-weight:700;color:var(--text-light);letter-spacing:.5px;
}
.calendar__row{display:grid;grid-template-columns:repeat(7,1fr)}
.calendar__cell{
  min-height:66px;padding:9px 8px 7px;
  border-top:1px solid rgba(255,255,255,0.4);
  border-left:1px solid rgba(255,255,255,0.4);
  cursor:pointer;transition:background .12s;background:rgba(255,255,255,0.18);
}
.calendar__cell:hover{background:rgba(255,255,255,0.42)}
.calendar__cell.is-past{background:rgba(255,255,255,0.10);cursor:default}
.calendar__cell.is-past:hover{background:rgba(255,255,255,0.10)}
.calendar__cell.is-today{background:rgba(123,159,176,0.22)}
.calendar__cell.is-done{background:rgba(255,255,255,0.35)}
.calendar__cell.is-empty{background:rgba(255,255,255,0.06);cursor:default}
.calendar__num{
  font-size:15px;font-weight:500;color:var(--text);text-align:right;margin-bottom:5px;line-height:1;
}
.calendar__num.grayed{color:rgba(180,170,160,0.7);font-weight:400}
.today-num{
  background:var(--text);color:white;
  width:22px;height:22px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;float:right;
}
.calendar__bar{height:4px;border-radius:2px;margin-top:3px}
.calendar__check{font-size:10px;color:var(--text-light);text-align:center;margin-top:2px}

/* ── WEEK CARDS ──────────────────────────────────────── */
.weeks-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
@media(max-width:560px){.weeks-grid{grid-template-columns:1fr}}
.week-card{
  border-radius:var(--r-xl);padding:20px 22px;
  cursor:pointer;display:flex;flex-direction:column;gap:12px;
  transition:all .18s;text-align:left;width:100%;border:none;
}
.week-card:hover{transform:translateY(-2px);box-shadow:var(--glass-shadow-hover)}
.week-card__icon{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  background:rgba(255,255,255,0.55);
}
.week-card__name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.week-card__days{font-size:14px;color:var(--text-light);margin-bottom:8px}
.week-card__prog-track{height:4px;background:rgba(0,0,0,0.1);border-radius:2px;overflow:hidden}
.week-card__prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── PROGRESS VIEW ───────────────────────────────────── */
.progress-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:30px}
@media(max-width:480px){.progress-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{border-radius:var(--r-lg);padding:22px 18px;text-align:center}
.stat-card__num{font-family:'Lora',serif;font-size:38px;color:var(--text);margin-bottom:5px}
.stat-card__label{font-size:14px;color:var(--text-light);font-weight:500}

/* ── WEEK INTRO ──────────────────────────────────────── */
.week-hero{padding:clamp(30px,5vw,50px) 0;color:white;position:relative;overflow:hidden;margin:0 -24px}
.week-hero::after{
  content:'';position:absolute;bottom:-50px;right:-40px;
  width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);
}
.week-hero__inner{position:relative;z-index:1;padding:0 24px}
.week-hero__eyebrow{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:10px}
.week-hero__title{font-family:'Lora',serif;font-style:italic;font-size:clamp(24px,4.5vw,34px);color:white;margin-bottom:5px}
.week-hero__range{font-size:14px;color:rgba(255,255,255,.6);letter-spacing:2px}
.week-anchor{border-left:3px solid;border-radius:0 var(--r-md) var(--r-md) 0;padding:18px 20px;margin:26px 0}
.week-anchor__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.week-anchor__verse{font-family:'Lora',serif;font-style:italic;font-size:18px;color:var(--text);line-height:1.65;margin-bottom:8px}
.week-anchor__ref{font-size:14px;color:var(--text-light)}
.day-list{display:flex;flex-direction:column;gap:12px;margin-top:22px}
.day-list-item{
  display:flex;align-items:center;gap:16px;
  padding:16px 18px;border-radius:var(--r-lg);
  cursor:pointer;transition:all .14s;text-align:left;width:100%;border:none;
}
.day-list-item:hover{transform:translateY(-1px);box-shadow:var(--glass-shadow-hover)}
.day-list-item__badge{
  width:40px;height:40px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:white;flex-shrink:0;
}
.day-list-item__title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.day-list-item__ref{font-size:14px;color:var(--text-light)}

/* ── DAY VIEW ────────────────────────────────────────── */
.day-header{padding:22px 0 18px}
.day-header__week{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.day-header__num{font-size:14px;color:var(--text-light);margin-bottom:10px}
.day-title{
  font-family:'Lora',serif;
  font-size:clamp(30px,5.5vw,44px);
  color:var(--text);line-height:1.18;margin-bottom:12px;
}
.day-divider{height:2px;border:none;margin-bottom:18px}
.reading-pill{
  display:inline-flex;align-items:center;gap:8px;
  border-radius:30px;padding:10px 18px;
  margin-bottom:30px;font-size:15px;color:var(--text-mid);font-weight:500;
}

/* Verse card */
.verse-card{border-radius:var(--r-xl);padding:26px 28px;margin-bottom:34px}
.verse-card__text{
  font-family:'Lora',serif;font-style:italic;
  font-size:clamp(18px,3vw,22px);
  color:var(--text);line-height:1.68;margin-bottom:12px;
}
.verse-card__ref{font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

/* Day section */
.day-section{margin-bottom:38px}
.day-section__header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.day-section__bar{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.day-section__label{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase}
.day-section p{font-size:18px;line-height:1.8;color:var(--text-mid)}

/* Application */
.application-box{border-radius:var(--r-xl);padding:24px 26px;margin-bottom:38px}
.application-box__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.application-box p{font-size:18px;line-height:1.75;color:var(--text-mid);margin-bottom:0}

/* NOTAS — textarea real */
.notes-box{border-radius:var(--r-xl);padding:22px 24px;margin-bottom:34px}
.notes-box__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.notes-box__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}
.notes-box__saved{font-size:13px;color:#6B9E8A;opacity:0;transition:opacity .3s;font-weight:500}
.notes-textarea{
  width:100%;min-height:150px;
  border:none;outline:none;resize:vertical;
  font-family:'Poppins',sans-serif;font-size:17px;
  color:var(--text-mid);line-height:1.7;background:transparent;
  padding:4px 0;
}
.notes-textarea::placeholder{color:rgba(180,170,165,0.7)}

/* Prayer */
.prayer-box{border-radius:var(--r-xl);padding:24px 26px;margin-bottom:34px}
.prayer-box p{font-size:18px;font-style:italic;color:var(--text-mid);line-height:1.8}

/* Phrase */
.phrase-card{border-radius:var(--r-xl);padding:26px 30px;margin-bottom:34px;position:relative;overflow:hidden;color:white}
.phrase-card::before{
  content:'"';
  position:absolute;top:-18px;left:18px;
  font-family:'Lora',serif;font-size:130px;
  color:rgba(255,255,255,.10);line-height:1;pointer-events:none;
}
.phrase-card__label{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:12px}
.phrase-card__text{font-family:'Lora',serif;font-style:italic;font-size:clamp(17px,3vw,21px);color:white;line-height:1.55;position:relative;z-index:1}

/* Complete button */
.btn-complete{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:19px;border-radius:var(--r-lg);border:none;
  font-size:18px;font-weight:700;color:white;
  margin-bottom:26px;transition:all .18s;letter-spacing:.3px;
}
.btn-complete:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.15)}
.btn-complete.is-done{background:#6B9E8A!important}

/* Day nav */
.day-nav{
  display:flex;align-items:center;gap:14px;
  margin-bottom:22px;padding-bottom:22px;
  border-bottom:1px solid rgba(255,255,255,0.5);
}
.day-nav a,.day-nav button{
  flex:1;padding:15px;border-radius:var(--r-md);
  font-size:15px;font-weight:600;background:rgba(255,255,255,0.45);
  backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,0.65);
  color:var(--text-mid);transition:all .14s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.day-nav a:hover,.day-nav button:hover{
  background:rgba(255,255,255,0.65);transform:translateY(-1px);
}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:var(--r-md);
  font-size:15px;font-weight:600;border:none;transition:all .15s;cursor:pointer;
}
.btn--primary{background:#7B9FB0;color:white}
.btn--primary:hover{background:#6A8EA0;transform:translateY(-1px);box-shadow:0 8px 24px rgba(123,159,176,.35)}
.btn--glass{
  background:rgba(255,255,255,0.55);
  backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,0.7);
  color:var(--text-mid);
}
.btn--glass:hover{background:rgba(255,255,255,0.75);transform:translateY(-1px)}
.btn--sm{padding:10px 18px;font-size:14px;border-radius:var(--r-sm)}

/* ── PROGRESS BAR ────────────────────────────────────── */
.prog-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.prog-track{flex:1;height:5px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .45s}
.prog-label{font-size:14px;color:var(--text-light);white-space:nowrap}

/* ── FOOTER ──────────────────────────────────────────── */
.footer-verse{text-align:center;padding:40px 0 56px;margin-top:50px;border-top:1px solid rgba(255,255,255,0.4)}
.footer-verse p{font-family:'Lora',serif;font-style:italic;font-size:16px;color:var(--text-light);margin-bottom:6px}
.footer-verse small{font-size:13px;color:var(--text-xlight);letter-spacing:1px}

/* ── DIVIDER ─────────────────────────────────────────── */
.divider{height:1px;border:none;background:rgba(255,255,255,0.45);margin:30px 0}

/* ── ANIMATION ───────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:fadeUp .22s ease forwards}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:600px){
  .top-nav__inner,.hero__inner,.container{padding-left:16px;padding-right:16px}
  .week-hero{margin:0 -16px}
  .week-hero__inner{padding:0 16px}
  .today-card{padding:18px 20px}
  .verse-card,.application-box,.phrase-card,.prayer-box,.notes-box{padding:20px 22px}
}
@media(min-width:860px){
  .day-section p,.application-box p,.prayer-box p{font-size:19px}
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="top-nav__inner">
    <a href="#" onclick="event.preventDefault();navigate('home')" class="nav-brand">
      Devocional <span>Julio 2026</span>
    </a>
    <div class="nav-links">
