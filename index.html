<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="theme-color" content="#3D5D91">
  <title>Caminando con Jesús 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
/* ── PALETA ─────────────────────────────────────────────
   Burgundy    #6C0820
   Cherry Blossom Pink  #F2AEBC
   Misty Rose  #F2DCDB
   Silver Lake Blue  #5A86CB
   Lapis Lazuli  #3D5D91
─────────────────────────────────────────────────────── */
:root{
  --burgundy:#6C0820;
  --cherry:#F2AEBC;
  --misty:#F2DCDB;
  --silver:#5A86CB;
  --lapis:#3D5D91;

  --glass:rgba(255,255,255,0.52);
  --glass-strong:rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.65);
  --glass-shadow:0 8px 36px rgba(61,93,145,0.10),inset 0 1px 0 rgba(255,255,255,0.88);
  --glass-shadow-hover:0 16px 48px rgba(61,93,145,0.14),inset 0 1px 0 rgba(255,255,255,0.9);
  --blur:blur(28px) saturate(165%);
  --blur-heavy:blur(44px) saturate(185%);
  --r-xl:24px;--r-lg:18px;--r-md:14px;--r-sm:10px;
  --text:#1C1832;--text-mid:#3D3558;--text-light:#8A8AAB;--text-xlight:#B5B0C8;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
a{color:inherit;text-decoration:none}
button{font-family:'Poppins',sans-serif;cursor:pointer}
input,textarea{font-family:'Poppins',sans-serif}

/* ── BODY — fondo cherry blossom + cielo azul ─────────── */
body{
  font-family:'Poppins',sans-serif;
  color:var(--text);font-size:19px;line-height:1.65;
  /* Base: Misty Rose muy suave */
  background-color:#E8DCE0;
  background-image:
    /* Silver Lake Blue — esquina superior izquierda */
    radial-gradient(ellipse at 5% 12%, rgba(90,134,203,.42) 0%,transparent 40%),
    /* Cherry Blossom — arriba derecha */
    radial-gradient(ellipse at 95% 8%,  rgba(242,174,188,.60) 0%,transparent 38%),
    /* Lapis Lazuli — abajo derecha */
    radial-gradient(ellipse at 88% 88%, rgba(61,93,145,.32) 0%,transparent 42%),
    /* Burgundy — abajo izquierda */
    radial-gradient(ellipse at 10% 90%, rgba(108,8,32,.22) 0%,transparent 36%),
    /* Centro claro Misty Rose */
    radial-gradient(ellipse at 50% 48%, rgba(252,244,246,.92) 0%,transparent 62%);
  background-attachment:fixed;
  min-height:100vh;
}

/* ── GLASS ──────────────────────────────────────────────── */
.glass{
  background:rgba(255,255,255,0.54);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,0.68);
  box-shadow:var(--glass-shadow);
}

/* ── TYPOGRAPHY ─────────────────────────────────────────── */
h1{font-family:'Lora',serif;font-size:clamp(28px,5vw,40px);color:var(--text);line-height:1.18}
h2{font-family:'Lora',serif;font-size:clamp(23px,4vw,30px);color:var(--text);line-height:1.22}
p{color:var(--text-mid);line-height:1.78;margin-bottom:16px;font-size:18px}
p:last-child{margin-bottom:0}
.label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}

/* ── LAYOUT ─────────────────────────────────────────────── */
.container{max-width:860px;margin:0 auto;padding:0 24px}

/* ── SPINNER ─────────────────────────────────────────────── */
.spinner{width:36px;height:36px;border:3px solid rgba(90,134,203,.3);border-top-color:var(--silver);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NAV ─────────────────────────────────────────────────── */
.top-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(226,215,220,0.80);
  backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy);
  border-bottom:1px solid rgba(255,255,255,0.55);
  box-shadow:0 1px 0 rgba(108,8,32,.04);
}
.top-nav__inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;padding:0 24px}
.nav-brand{font-family:'Lora',serif;font-style:italic;font-size:22px;color:var(--lapis);cursor:pointer;font-weight:400}
.nav-brand span{font-family:'Poppins',sans-serif;font-style:normal;font-size:13px;color:var(--text-light);font-weight:500;margin-left:10px;letter-spacing:1px;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-link{
  padding:9px 18px;border-radius:10px;font-size:15px;
  font-weight:500;color:var(--text-mid);transition:all .15s;
  border:1px solid transparent;background:transparent;cursor:pointer;
}
.nav-link:hover{background:rgba(255,255,255,.55);border-color:rgba(255,255,255,.7)}
.nav-link.active{background:rgba(90,134,203,.18);border-color:rgba(90,134,203,.35);color:var(--lapis);font-weight:600}
.nav-user{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.65)}
.nav-user-email{font-size:13px;color:var(--text-mid);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-logout{font-size:12px;color:var(--burgundy);font-weight:600;background:none;border:none;padding:0;cursor:pointer;transition:opacity .15s}
.nav-logout:hover{opacity:.7}

/* ── BREADCRUMB ─────────────────────────────────────────── */
.breadcrumb{padding:18px 0 0;display:flex;align-items:center;gap:8px;font-size:15px;color:var(--text-light);flex-wrap:wrap}
.breadcrumb a{color:var(--silver);transition:color .15s;font-weight:500}
.breadcrumb a:hover{color:var(--lapis)}
.breadcrumb__sep{color:var(--cherry);font-size:14px}

/* ── HERO ────────────────────────────────────────────────── */
.hero{
  background:linear-gradient(140deg,#2A4070 0%,var(--lapis) 45%,var(--silver) 100%);
  padding:clamp(44px,7vw,72px) 0 clamp(40px,6vw,62px);
  color:white;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60px;right:-50px;
  width:300px;height:300px;border-radius:50%;
  background:rgba(242,174,188,.14); /* cherry blossom blob */
}
.hero::after{
  content:'';position:absolute;bottom:-80px;left:-60px;
  width:340px;height:340px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.hero__inner{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 24px}
.hero__eyebrow{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:12px}
.hero__title{font-family:'Lora',serif;font-style:italic;font-size:clamp(34px,6vw,52px);color:white;margin-bottom:8px;line-height:1.12}
.hero__subtitle{font-size:17px;color:rgba(255,255,255,.75);margin-bottom:28px;line-height:1.5}
.hero__verse{
  font-family:'Lora',serif;font-style:italic;
  font-size:18px;color:rgba(255,255,255,.9);
  border-left:2px solid var(--cherry);
  padding-left:18px;margin-bottom:30px;line-height:1.65;
}
.hero__prog-label{font-size:14px;color:rgba(255,255,255,.72);display:flex;justify-content:space-between;margin-bottom:10px}
.hero__prog-label strong{color:white;font-weight:700}
.hero__prog-track{height:6px;background:rgba(255,255,255,.22);border-radius:3px;overflow:hidden}
.hero__prog-fill{height:100%;background:var(--cherry);border-radius:3px;transition:width .5s ease}

/* ── TODAY CARD ─────────────────────────────────────────── */
.today-card{border-radius:var(--r-xl);padding:24px 26px;margin:28px 0 24px;display:flex;align-items:flex-start;gap:18px;transition:box-shadow .2s;cursor:pointer}
.today-card:hover{box-shadow:var(--glass-shadow-hover)}
.today-card__badge{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:rgba(242,174,188,.4)}
.today-card__meta{font-size:13px;color:var(--silver);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.today-card__title{font-family:'Lora',serif;font-size:22px;color:var(--text);margin-bottom:5px;line-height:1.3}
.today-card__ref{font-size:15px;color:var(--text-light);margin-bottom:16px}

/* ── SECTION HEADING ────────────────────────────────────── */
.section-heading{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:32px}
.section-heading h3{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}

/* ── CALENDAR ───────────────────────────────────────────── */
.calendar{border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px}
.calendar__header{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(242,174,188,.25)}
.calendar__dname{text-align:center;padding:11px 0;font-size:13px;font-weight:700;color:var(--lapis);letter-spacing:.5px}
.calendar__row{display:grid;grid-template-columns:repeat(7,1fr)}
.calendar__cell{min-height:66px;padding:9px 8px 7px;border-top:1px solid rgba(255,255,255,.45);border-left:1px solid rgba(255,255,255,.45);cursor:pointer;transition:background .12s;background:rgba(255,255,255,.20)}
.calendar__cell:hover{background:rgba(255,255,255,.48)}
.calendar__cell.is-past{background:rgba(255,255,255,.10);cursor:default}
.calendar__cell.is-past:hover{background:rgba(255,255,255,.10)}
.calendar__cell.is-today{background:rgba(90,134,203,.22)}
.calendar__cell.is-done{background:rgba(242,220,219,.45)}
.calendar__cell.is-empty{background:rgba(255,255,255,.06);cursor:default}
.calendar__num{font-size:15px;font-weight:500;color:var(--text);text-align:right;margin-bottom:5px;line-height:1}
.calendar__num.grayed{color:rgba(180,170,180,.65);font-weight:400}
.today-num{background:var(--lapis);color:white;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;float:right}
.calendar__bar{height:4px;border-radius:2px;margin-top:3px}
.calendar__check{font-size:10px;color:var(--silver);text-align:center;margin-top:2px}

/* ── WEEK CARDS ─────────────────────────────────────────── */
.weeks-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
@media(max-width:560px){.weeks-grid{grid-template-columns:1fr}}
.week-card{border-radius:var(--r-xl);padding:20px 22px;cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:all .18s;text-align:left;width:100%;border:none}
.week-card:hover{transform:translateY(-2px);box-shadow:var(--glass-shadow-hover)}
.week-card__icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(255,255,255,.55)}
.week-card__name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.week-card__days{font-size:14px;color:var(--text-light);margin-bottom:8px}
.week-card__prog-track{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden}
.week-card__prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── PROGRESS ───────────────────────────────────────────── */
.progress-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:30px}
@media(max-width:480px){.progress-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{border-radius:var(--r-lg);padding:22px 18px;text-align:center}
.stat-card__num{font-family:'Lora',serif;font-size:38px;margin-bottom:5px}
.stat-card__label{font-size:14px;color:var(--text-light);font-weight:500}

/* ── WEEK VIEW ──────────────────────────────────────────── */
.week-hero{padding:clamp(30px,5vw,50px) 0;color:white;position:relative;overflow:hidden;margin:0 -24px}
.week-hero::after{content:'';position:absolute;bottom:-50px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.week-hero__inner{position:relative;z-index:1;padding:0 24px}
.week-hero__eyebrow{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:10px}
.week-hero__title{font-family:'Lora',serif;font-style:italic;font-size:clamp(24px,4.5vw,34px);color:white;margin-bottom:5px}
.week-hero__range{font-size:14px;color:rgba(255,255,255,.65);letter-spacing:2px}
.week-anchor{border-left:3px solid;border-radius:0 var(--r-md) var(--r-md) 0;padding:18px 20px;margin:26px 0}
.week-anchor__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.week-anchor__verse{font-family:'Lora',serif;font-style:italic;font-size:18px;color:var(--text);line-height:1.65;margin-bottom:8px}
.week-anchor__ref{font-size:14px;color:var(--text-light)}
.day-list{display:flex;flex-direction:column;gap:12px;margin-top:22px}
.day-list-item{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:var(--r-lg);cursor:pointer;transition:all .14s;text-align:left;width:100%;border:none}
.day-list-item:hover{transform:translateY(-1px);box-shadow:var(--glass-shadow-hover)}
.day-list-item__badge{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0}
.day-list-item__title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.day-list-item__ref{font-size:14px;color:var(--text-light)}

/* ── DAY VIEW ───────────────────────────────────────────── */
.day-header{padding:22px 0 18px}
.day-header__week{font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.day-header__num{font-size:14px;color:var(--text-light);margin-bottom:10px}
.day-title{font-family:'Lora',serif;font-size:clamp(30px,5.5vw,44px);color:var(--text);line-height:1.18;margin-bottom:12px}
.day-divider{height:2px;border:none;margin-bottom:18px}
.reading-pill{display:inline-flex;align-items:center;gap:8px;border-radius:30px;padding:10px 18px;margin-bottom:30px;font-size:15px;color:var(--text-mid);font-weight:500}
.verse-card{border-radius:var(--r-xl);padding:26px 28px;margin-bottom:34px}
.verse-card__text{font-family:'Lora',serif;font-style:italic;font-size:clamp(18px,3vw,22px);color:var(--text);line-height:1.68;margin-bottom:12px}
.verse-card__ref{font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.day-section{margin-bottom:38px}
.day-section__header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.day-section__bar{width:4px;height:18px;border-radius:2px;flex-shrink:0}
.day-section__label{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase}
.day-section p{font-size:18px;line-height:1.8;color:var(--text-mid)}
.application-box{border-radius:var(--r-xl);padding:24px 26px;margin-bottom:38px}
.application-box__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.application-box p{font-size:18px;line-height:1.75;color:var(--text-mid);margin-bottom:16px}
.app-divider{height:1px;background:rgba(108,8,32,.08);margin:20px 0 18px}
.save-box{border-radius:var(--r-xl);padding:22px 24px;margin-bottom:34px}
.save-box__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.save-box__label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light)}
.save-box__status{font-size:13px;color:var(--lapis);opacity:0;transition:opacity .3s;font-weight:600}
.save-textarea{width:100%;min-height:130px;border:none;outline:none;resize:vertical;font-size:17px;color:var(--text-mid);line-height:1.7;background:transparent;padding:4px 0}
.save-textarea::placeholder{color:rgba(180,170,180,.65)}
.prayer-box{border-radius:var(--r-xl);padding:24px 26px;margin-bottom:34px}
.prayer-box p{font-size:18px;font-style:italic;color:var(--text-mid);line-height:1.8}
.phrase-card{border-radius:var(--r-xl);padding:26px 30px;margin-bottom:34px;position:relative;overflow:hidden;color:white}
.phrase-card::before{content:'"';position:absolute;top:-18px;left:18px;font-family:'Lora',serif;font-size:130px;color:rgba(255,255,255,.10);line-height:1;pointer-events:none}
.phrase-card__label{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:12px}
.phrase-card__text{font-family:'Lora',serif;font-style:italic;font-size:clamp(17px,3vw,21px);color:white;line-height:1.55;position:relative;z-index:1}
.btn-complete{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:19px;border-radius:var(--r-lg);border:none;font-size:18px;font-weight:700;color:white;margin-bottom:26px;transition:all .18s}
.btn-complete:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.15)}
.day-nav{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid rgba(255,255,255,.5)}
.day-nav-btn{flex:1;padding:15px;border-radius:var(--r-md);font-size:15px;font-weight:600;background:rgba(255,255,255,.45);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.65);color:var(--text-mid);transition:all .14s;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.day-nav-btn:hover{background:rgba(255,255,255,.65);transform:translateY(-1px)}
.day-nav-home{flex:0;padding:15px 18px}

/* ── PROGRESS BARS ──────────────────────────────────────── */
.prog-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.prog-track{flex:1;height:5px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .45s}
.prog-label{font-size:14px;color:var(--text-light);white-space:nowrap}

/* ── FOOTER ─────────────────────────────────────────────── */
.footer-verse{text-align:center;padding:40px 0 56px;margin-top:50px;border-top:1px solid rgba(242,174,188,.4)}
.footer-verse p{font-family:'Lora',serif;font-style:italic;font-size:16px;color:var(--text-light);margin-bottom:6px}
.footer-verse small{font-size:13px;color:var(--text-xlight);letter-spacing:1px}

/* ── BUTTONS ────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--r-md);font-size:15px;font-weight:600;border:none;transition:all .15s;cursor:pointer}
.btn--primary{background:var(--silver);color:white}
.btn--primary:hover{background:var(--lapis);transform:translateY(-1px);box-shadow:0 8px 24px rgba(61,93,145,.35)}
.btn--sm{padding:10px 18px;font-size:14px;border-radius:var(--r-sm)}

/* ════════════════════════════════════════════════════════
   AUTH SCREEN — Cherry Blossom theme
════════════════════════════════════════════════════════ */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:420px;border-radius:28px;padding:36px 32px 32px}
.auth-brand{text-align:center;margin-bottom:28px}
.auth-brand__icon{font-size:40px;margin-bottom:10px}
.auth-brand__title{font-family:'Lora',serif;font-style:italic;font-size:26px;color:var(--lapis);margin-bottom:4px}
.auth-brand__sub{font-size:14px;color:var(--text-light)}
.auth-tabs{display:flex;gap:4px;background:rgba(61,93,145,.08);border-radius:12px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:10px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;background:transparent;color:var(--text-light)}
.auth-tab.active{background:white;color:var(--lapis);box-shadow:0 2px 8px rgba(61,93,145,.12)}
.auth-field{margin-bottom:14px}
.auth-label{display:block;font-size:13px;font-weight:600;color:var(--text-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.auth-input{width:100%;padding:14px 18px;border-radius:13px;border:1.5px solid rgba(255,255,255,.65);background:rgba(255,255,255,.55);backdrop-filter:blur(12px);font-size:17px;color:var(--text);outline:none;transition:all .18s}
.auth-input:focus{border-color:rgba(90,134,203,.8);background:rgba(255,255,255,.72);box-shadow:0 0 0 3px rgba(90,134,203,.15)}
.auth-input::placeholder{color:rgba(180,170,180,.7)}
.auth-error{background:rgba(108,8,32,.10);border:1px solid rgba(108,8,32,.25);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--burgundy);margin-bottom:16px;display:none;line-height:1.5}
.auth-error.show{display:block}
.auth-submit{
  width:100%;padding:16px;border-radius:13px;border:none;
  font-size:17px;font-weight:700;color:white;
  background:linear-gradient(135deg,var(--lapis),var(--silver));
  cursor:pointer;transition:all .18s;margin-top:6px;
  box-shadow:0 4px 20px rgba(61,93,145,.30);
}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(61,93,145,.38)}
.auth-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-or{text-align:center;font-size:13px;color:var(--text-light);margin:20px 0;position:relative}
.auth-or::before,.auth-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(108,8,32,.1)}
.auth-or::before{left:0}.auth-or::after{right:0}
.auth-skip{text-align:center;margin-top:18px}
.auth-skip a{font-size:14px;color:var(--text-light);transition:color .15s}
.auth-skip a:hover{color:var(--silver)}
.auth-forgot{text-align:right;margin-top:-8px;margin-bottom:16px}
.auth-forgot a{font-size:13px;color:var(--silver)}

.page-enter{animation:fadeUp .22s ease forwards}

}

<script>
const WEEKS = {"2": {"c": "#A84B6A", "l": "#FBF0F3", "dk": "#6C0820", "name": "Más valiosa que las joyas", "emoji": "💎", "days": [10, 11, 12, 13, 14]}, "3": {"c": "#5A86CB", "l": "#EBF2FC", "dk": "#3D5D91", "name": "Hábitos que transforman", "emoji": "🌿", "days": [15, 16, 17, 18, 19, 20, 21]}, "4": {"c": "#3D5D91", "l": "#E5EAF7", "dk": "#2A4070", "name": "Intimidad con el Padre", "emoji": "🙏", "days": [22, 23, 24, 25, 26, 27, 28]}, "5": {"c": "#6C0820", "l": "#F9E8EA", "dk": "#4A0515", "name": "El Consolador", "emoji": "🕊", "days": [29, 30, 31]}};
const DAYS  = [{"day": 10, "date": "Viernes, 10 de julio", "week": 2, "title": "Eres su obra maestra", "ref": "Efesios 2:10", "verse": "Pues somos la obra maestra de Dios. Él nos creó de nuevo en Cristo Jesús, a fin de que hagamos las cosas buenas que preparó para nosotros tiempo atrás.", "verseRef": "Efesios 2:10 (NTV)", "context": "Pablo escribe Efesios desde la prisión romana (~62 d.C.). Éfeso era capital de la provincia de Asia, sede del templo de Artemisa —una de las siete maravillas del mundo— y centro de filosofía y comercio.\n\nLa palabra griega poiēma (ποίημα) — de donde viene \"poema\" — no describía un objeto fabricado en serie, sino una obra creada con maestría deliberada y artística. Es la palabra para la escultura más cuidada, el himno más elaborado.\n\nEl contexto es poderoso: en v.1-3, Pablo describe a sus lectores como \"muertos en sus delitos\". El movimiento de muerte a vida pasa por la gracia (v.4-9). Y la conclusión de ese movimiento es: eres el poema de Dios. No fuiste rescatada para ser un número más.\n\nLa frase \"que preparó de antemano\" usa el griego proetoimasen: \"pro\" (antes de) + \"etoimazō\" (preparar con cuidado). Los propósitos para los que fuiste diseñada existían en la mente de Dios antes de que tú existieras.", "teaching": "Muchas personas llevan toda la vida sintiéndose como borradores — versiones fallidas de algo que debería ser mejor. Este versículo dice lo contrario: eres el resultado final y deliberado de la creación más cuidadosa.\n\nNota que Pablo no dice que llegarás a ser la obra maestra cuando seas más madura. Lo dice en tiempo presente: ya eres. El artesano no llama \"obra maestra\" a lo que está a medias — Dios te llama así porque ve lo que está haciendo con una perspectiva que tú aún no tienes.\n\nEsto no niega que hay crecimiento. Significa que el crecimiento ocurre desde una identidad segura. No caminamos para convertirnos en alguien valioso — caminamos como alguien que ya sabe que lo es.", "application": "Escribe 3 dones, rasgos de carácter o formas únicas de ver el mundo que Dios puso en ti (no logros — rasgos de quién eres). Al lado de cada uno escribe: \"Gracias, Padre, por diseñar esto en mí.\"", "prayer": "Señor, me cuesta creer que soy tu obra maestra cuando veo tantas áreas incompletas. Pero hoy elijo creer lo que tú dices sobre mí. Gracias porque no me hiciste en serie — me diseñaste con intención. Ayúdame a caminar en los propósitos que preparaste antes de que yo existiera. Amén.", "phrase": "No soy un borrador — soy el poema que Dios escribió deliberadamente, antes de que yo supiera que existía.", "reading": "Efesios 2:1-10", "journal": ["Escribe 3 rasgos, dones o formas de ser que son únicamente tuyas — no logros, sino quién eres.", "¿Cuál de ellos te cuesta más recibir como diseño de Dios?", "Completa esta frase: \"Soy el poema de Dios porque...\""]}, {"day": 11, "date": "Sábado, 11 de julio", "week": 2, "title": "Tu verdadera belleza", "ref": "1 Pedro 3:3-4", "verse": "En cambio, vístanse con la belleza interior, la que no se desvanece, la belleza de un espíritu tierno y sereno, lo cual es tan precioso a los ojos de Dios.", "verseRef": "1 Pedro 3:4 (NTV)", "context": "Pedro escribe (~64-67 d.C.) a creyentes bajo persecución de Nerón. En Roma, la apariencia femenina era un marcador de estatus social visible — joyas elaboradas, peinados complejos y telas costosas señalaban la posición de una familia.\n\nLa palabra clave es praus (πραΰς) — \"tierno\" o \"apacible\". Es exactamente la misma palabra que Jesús usó para describir su propio corazón en Mateo 11:29. No significa pasividad — significa fuerza puesta al servicio de los demás.\n\nLa palabra incorrupto (ἄφθαρτος) contrasta directamente con la belleza física perecedera: lo que Pedro describe como bello ante Dios es \"lo que no puede corromperse\". El tiempo no lo toca.\n\nY la escala de valor es radical: polyteles — de gran precio, de valor excepcional. A los ojos de Dios, no de las redes sociales.", "teaching": "La cultura ha perfeccionado el sistema de evaluación visual. Hay filtros para todo, y una industria entera dedicada a que sintamos que como somos no es suficiente.\n\nPedro no está en contra de cuidar la apariencia. Está diciendo algo más radical: hay una belleza que el tiempo no puede deshacer. Un espíritu tierno que responde con ternura en lugar de con reactividad. Un espíritu sereno que opera desde la paz aunque las circunstancias sean turbulentas.\n\nEsa belleza se cultiva en la intimidad con Dios. No se compra, no se filtra, no se edita. Crece cuando el Espíritu Santo tiene espacio para trabajar en lo profundo del carácter.", "application": "¿Cuánto tiempo inviertes semanalmente en tu apariencia externa vs. en cultivar tu mundo interior (oración, Palabra, reflexión)? No para condenarte — para tomar una decisión intencional. ¿Qué hábito interior quieres desarrollar esta semana?", "prayer": "Padre, en un mundo que evalúa la superficie, ayúdame a valorar lo que tú valoras. Quiero desarrollar esa belleza que no se desvanece. Que el Espíritu Santo trabaje en lo profundo de mi carácter, en las áreas que nadie más ve. Amén.", "phrase": "La belleza que Dios ve en mí no la puede tocar el tiempo ni el espejo — se cultiva en lo profundo.", "reading": "1 Pedro 3:1-12", "journal": ["¿En qué área inviertes más energía: tu mundo exterior o tu mundo interior?", "¿Qué hábito interior concreto quieres cultivar esta semana?"]}, {"day": 12, "date": "Domingo, 12 de julio", "week": 2, "title": "Más preciosa que las joyas", "ref": "Proverbios 3:13-15", "verse": "La sabiduría es más preciosa que los rubíes; nada de lo que deseas puede compararse a ella.", "verseRef": "Proverbios 3:15 (NTV)", "context": "Proverbios pertenece al género de la \"literatura de sabiduría\". La sabiduría bíblica tiene un fundamento teológico: \"El temor del Señor es el principio de la sabiduría\" (9:10).\n\nLa palabra hebrea ḥokmāh no describe conocimiento académico sino habilidad práctica para vivir bien delante de Dios — la capacidad de tomar decisiones sabias, de un artesano para trabajar bien.\n\nEl término \"rubíes\" (penīnīm) refería a lo más valioso del mundo material conocido. Esta misma comparación aparece en Proverbios 31:10 para la mujer de carácter noble. No es coincidencia: lo que hace valiosa a esa mujer es que vive con sabiduría — su vida está orientada hacia Dios.", "teaching": "El mundo tiene una ecuación del valor: apariencia + logros + reconocimiento social. Por eso el valor fluctúa según el día, según quién te vea, según lo que produzcas.\n\nLa sabiduría bíblica propone algo completamente diferente. El valor de la mujer de Proverbios 31 no viene de la lista de cosas que hace — viene de quién es en su relación con Dios: \"La mujer que teme al Señor será sumamente alabada\" (31:30).\n\nLa sabiduría, en su sentido más profundo, es una postura del corazón: ¿estoy orientando mi vida hacia Dios o hacia otro centro?", "application": "Piensa en una decisión pendiente. ¿Cómo cambiaría tu perspectiva si la filtraras a través de esta pregunta: \"¿Qué haría alguien que teme a Dios y no solo al resultado?\" Escríbelo.", "prayer": "Señor, dame sabiduría — no solo conocimiento, sino la habilidad de vivir bien delante de ti. Que mis decisiones estén marcadas por el temor del Señor, no por el miedo al qué dirán. Orienta toda mi vida hacia ti. Amén.", "phrase": "Valgo más que rubíes no por lo que logro — sino por quién soy cuando estoy orientada hacia Dios.", "reading": "Proverbios 3:13-20", "journal": ["¿Hay una decisión pendiente que podrías tomar desde \"el temor al Señor\"? Descríbela.", "¿Qué cambiaría si tu primera pregunta fuera \"¿qué diría Dios sobre esto?\"?"]}, {"day": 13, "date": "Lunes, 13 de julio", "week": 2, "title": "La mujer que teme al Señor", "ref": "Proverbios 31:25-31", "verse": "El encanto es engañoso y la belleza no perdura, pero la mujer que teme al SEÑOR será sumamente alabada.", "verseRef": "Proverbios 31:30 (NTV)", "context": "Proverbios 31:10-31 es un poema acróstico en hebreo: cada versículo comienza con una letra consecutiva del alefato. Este recurso literario decía que esta mujer encarna la sabiduría de la A a la Z.\n\nLa frase ʾēšet ḥayil — \"mujer virtuosa\" — usa la palabra ḥayil, la misma que describe a los guerreros poderosos. Esta es una mujer de valor guerrero — alguien que enfrenta la vida con fuerza y propósito.\n\nLa tradición judía conoce este poema como \"Ešet Ḥayil\", cantado por los esposos a sus esposas cada viernes en el Shabat. No es una lista de tareas que cumplir — es una canción de victoria.\n\nLa clave está en el v.30: yir'at YHWH — el temor del Señor. No pavor, sino una orientación fundamental de toda la vida hacia Dios.", "teaching": "Proverbios 31 ha sido usada durante siglos para hacer sentir culpables a las mujeres. Pero cuando entiendes su género — una canción de elogio, no un manual de rendimiento — la ves diferente.\n\n\"Se ríe sin temor al futuro\": no porque su vida sea perfecta, sino porque su seguridad no está en las circunstancias. Está en quién la sostiene.\n\n\"Está vestida de fortaleza y dignidad\": son prendas interiores, no externas. Esta mujer no vale porque lo hace todo. Lo hace todo porque sabe quién es ante Dios.", "application": "De todas las características de Proverbios 31, ¿cuál sientes que más necesitas que Dios desarrolle en ti ahora mismo? No la más impresionante — la más necesaria. Escríbela y por qué.", "prayer": "Señor, quiero ser una mujer que te teme — que orienta toda su vida hacia ti. Que la fortaleza y dignidad de este texto sean mías no porque me las gané sino porque me las das. Amén.", "phrase": "Me río sin temor al futuro — no porque todo esté bajo control, sino porque confío en quien sí lo está.", "reading": "Proverbios 31:10-31", "journal": ["De todas las características de Proverbios 31, ¿cuál necesitas más ahora mismo? ¿Por qué?", "¿Qué te impide \"reírte sin temor al futuro\"? Escríbelo con honestidad."]}, {"day": 14, "date": "Martes, 14 de julio", "week": 2, "title": "Reposo y reflexión", "ref": "Salmo 139:13-16", "verse": "¡Gracias por hacerme tan maravillosamente compleja! Tu fino trabajo es maravilloso, lo sé muy bien.", "verseRef": "Salmo 139:14 (NTV)", "context": "El Salmo 139 es uno de los textos más personales del Salterio. La palabra hebrea sakak (v.13) — \"entretejiste\" — describe bordado intrincado, igual al de los ornamentos del sumo sacerdote (Éxodo 28). David no dice \"Dios me ensambló\" sino \"Dios me bordó\".\n\nLa exclamación niplēim maaseka — \"maravilloso es tu obra\" — usa la misma raíz que describe los milagros más extraordinarios de Dios en el AT. Eso eres tú para Él: una obra en la categoría de lo maravilloso.\n\nLa palabra qānāh (v.13) — \"creaste\" — también significa \"poseer con ternura\". Hay un matiz de propiedad amorosa: Dios no solo te creó, sino que te posee desde el primer momento.", "teaching": "Hoy cierra la Semana 2 con este salmo porque es el fundamento de todo lo que viste esta semana: antes de que puedas hacer algo por Dios, Él ya hizo algo extraordinario contigo.\n\nEres la obra bordada de sus manos. Eres más preciosa que los rubíes. Eres una mujer a quien Él diseñó para reflejar su carácter.\n\nEl descanso del séptimo día es un día de memoria intencional. David escribe \"que nunca olvide\" porque sabemos que olvidamos fácilmente. Hoy hay espacio para que lo que ya recibiste baje del cerebro al corazón.", "application": "Mira atrás la semana. ¿Cuál día te habló más? ¿Qué verdad sobre tu valor se asentó de forma distinta? Escríbela con tus propias palabras — no como cita de un versículo, sino como algo que ahora es tuyo.", "prayer": "Padre, hoy te doy gracias por cómo me hiciste. No por lo que puedo producir — por cómo me bordaste. Que esta semana haya plantado en mí una imagen de mi valor más fuerte que la del espejo. Amén.", "phrase": "Fui bordada por manos que saben lo que hacen — y Dios llamó a su obra \"maravillosa\".", "reading": "Salmo 139:1-18", "journal": ["¿Cuál fue el día de esta semana que más te habló? ¿Qué lo hizo diferente?", "Escribe una verdad nueva sobre tu valor que esta semana sembró en ti."]}, {"day": 15, "date": "Miércoles, 15 de julio", "week": 3, "title": "El hábito de la oración", "ref": "Mateo 6:5-13", "verse": "Pero tú, cuando ores, apártate a solas, cierra la puerta detrás de ti y ora a tu Padre en privado. Entonces, tu Padre, quien todo lo ve, te recompensará.", "verseRef": "Mateo 6:6 (NTV)", "context": "El Sermón del Monte (Mateo 5-7) aborda en el capítulo 6 tres prácticas centrales: dar limosna, orar y ayunar. En los tres casos, el problema no es la práctica sino la motivación: hacerlo \"para ser vistos\".\n\nEn el siglo I, la oración judía era estructurada. Los fariseos practicaban el Amidá — dieciocho bendiciones tres veces al día — y era común hacerlo en esquinas visibles para ser vistos. Había competencia religiosa: quien oraba más elaboradamente gozaba de mayor prestigio.\n\nJesús usa la palabra tameion (ταμεῖον) — \"cuarto secreto\" — que refería al almacén privado de una casa, el lugar más escondido. \"Cierra la puerta\": privacidad total, sin audiencia, sin rendimiento espiritual.\n\nY la promesa: \"tu Padre, que ve en lo secreto, te recompensará.\" La recompensa es relacional: en el cuarto cerrado, lo encuentras a Él.", "teaching": "Jesús no dice \"si oras\" sino \"cuando ores\" — asume la oración como parte natural de la vida. Pero critica dos distorsiones: orar para impresionar, o usar muchas palabras para convencer a un Dios que ya sabe lo que necesitas (v.8).\n\n¿Por qué orar si Dios ya sabe? Porque la oración no cambia la mente de Dios hacia nosotros — nos cambia a nosotros hacia Él. Es el mecanismo por el cual nos sintonizamos con su perspectiva, recibimos su paz y alineamos nuestros deseos con los suyos.\n\nEl Padre Nuestro no es una fórmula para recitar — es un modelo de relación: primero reconocer a quién le hablas, luego alinear tu corazón con sus prioridades, y solo entonces presentar tus necesidades.", "application": "Establece hoy un \"cuarto cerrado\" — un tiempo y lugar físico específico para orar. 10 minutos de consistencia valen más que una hora esporádica. ¿Cuándo y dónde será?", "prayer": "Padre, enséñame a orar de verdad — no para cumplir un requisito, sino para conocerte. Que mi cuarto cerrado sea el lugar donde más me siento yo misma, donde no hay actuación. Amén.", "phrase": "La oración no cambia la mente de Dios hacia mí — me cambia a mí hacia Él.", "reading": "Mateo 6:1-15", "journal": ["¿Cuándo y dónde será tu \"cuarto cerrado\"? Sé específica — día, hora, lugar.", "¿Qué necesitas \"cerrar\" para estar realmente presente en ese momento?"]}, {"day": 16, "date": "Jueves, 16 de julio", "week": 3, "title": "Meditando en la Palabra", "ref": "Josué 1:7-9", "verse": "Estudia constantemente este libro de instrucción. Medita en él de día y de noche. Solo entonces prosperarás y te irá bien en todo lo que hagas.", "verseRef": "Josué 1:8 (NTV)", "context": "Este pasaje ocurre en uno de los momentos más tensos de la historia de Israel: Moisés acaba de morir y Josué tiene que liderar al pueblo a través del Jordán. En ese contexto de máxima presión, Dios no le da un plan de batalla. Le da una instrucción: medita en mi Palabra.\n\nLa palabra hebrea hāgāh (הָגָה) para \"meditar\" es una palabra de movimiento sonoro — se usa para el arrullo de una paloma (Isaías 38:14), el gruñido de un león sobre su presa (Isaías 31:4). La meditación bíblica no es silenciosa — es el murmullo continuo de quien rumia una verdad.\n\nLa promesa de v.8 — taskîl — no es éxito material, sino sabiduría en el actuar, prudencia en las decisiones, eficacia en lo que haces.", "teaching": "Hay una diferencia enorme entre leer la Biblia y meditar en ella. Leer es recibir información. Meditar es dejar que esa información se convierta en convicción, en perspectiva, en forma de ver el mundo.\n\nLa meditación bíblica no es vaciamiento mental — es llenado intencional. Tomas un versículo, lo repites, lo masticas, le preguntas: ¿qué me estás diciendo a mí, hoy, en esta situación?\n\nEn la práctica, puede ser tan simple como llevar un versículo en la mente durante el día. No necesitas dos horas de silencio. Necesitas el hábito del murmullo continuo.", "application": "Elige un versículo de esta semana y repítelo 5 veces en voz alta, lentamente. Cierra los ojos y recita lo que puedas de memoria. ¿Qué palabra o imagen te quedó? Busca una manera de llevarlo en la mente el resto del día.", "prayer": "Señor, que tu Palabra no sea solo lectura sino alimento. Que meditar en ella cambie la manera en que pienso, en que reacciono, en que veo mi vida. Plántame junto a tu corriente. Amén.", "phrase": "No leo la Biblia para cumplir un requisito — la medito para que cambie cómo pienso sin que me dé cuenta.", "reading": "Josué 1:1-9", "journal": ["Escribe el versículo de hoy de memoria con tus propias palabras.", "¿Cómo puedes llevar esta verdad en la mente mientras haces tu rutina hoy?"]}, {"day": 17, "date": "Viernes, 17 de julio", "week": 3, "title": "La gratitud como hábito", "ref": "1 Tesalonicenses 5:16-18", "verse": "Estén siempre alegres. Nunca dejen de orar. Sean agradecidos en toda circunstancia, pues esta es la voluntad de Dios para ustedes.", "verseRef": "1 Tesalonicenses 5:16-18 (NTV)", "context": "Pablo escribe a Tesalónica (~50 d.C.) — probablemente la carta más temprana que tenemos. Esta comunidad enfrentaba persecución activa y la presión de vivir la fe cristiana en una ciudad de fuertes lealtades al Imperio Romano.\n\nLa distinción crucial está en la preposición: Pablo no dice \"dad gracias por todas las cosas\" — dice \"en toda circunstancia\". No tienes que fingir que el dolor es bueno. Tienes que elegir gratitud dentro del dolor.\n\nLa neurociencia moderna confirma lo que la Escritura ha dicho siempre: la gratitud intencional reconfigura los circuitos neuronales. El cerebro que busca lo que falta puede ser entrenado para notar lo que está presente.", "teaching": "La gratitud como emoción depende de las circunstancias. La gratitud como hábito es diferente: una práctica deliberada que no espera sentir ganas. Es elegir mirar lo que hay antes de mirar lo que falta.\n\nPara el creyente, la gratitud es un acto de fe. Decir \"gracias\" en el dolor es afirmar que hay un Dios bueno que está activo incluso cuando no lo sientes. Es anclar la emoción en una verdad objetiva.\n\nEl hábito comienza pequeño: tres cosas específicas por las que dar gracias cada día. La especificidad importa — \"gracias por la conversación con Sara hoy\" activa más el cerebro que \"gracias por todo\".", "application": "Esta noche, antes de dormir, escribe 3 cosas específicas (no genéricas) por las que le das gracias a Dios hoy. Empieza así durante 7 días y observa qué cambia en tu perspectiva. Escribe las de hoy:", "prayer": "Padre, hoy elijo ver lo que diste antes de lo que falta. Gracias por lo que tengo, por quien soy y por donde estoy — aunque no siempre sea donde quiero estar. Desarrolla en mí el hábito de la gratitud. Amén.", "phrase": "La gratitud no niega el dolor — lo ancla en la bondad de un Dios que sigue presente incluso cuando no lo siento.", "reading": "1 Tesalonicenses 5:12-22", "journal": ["Escribe 3 cosas muy concretas de hoy por las que das gracias (no genéricas — específicas).", "¿En qué área de tu vida te cuesta más ser agradecida? ¿Sabes por qué?"]}, {"day": 18, "date": "Sábado, 18 de julio", "week": 3, "title": "El fruto del dominio propio", "ref": "Gálatas 5:22-23", "verse": "La clase de fruto que el Espíritu Santo produce en nuestra vida es: amor, alegría, paz, paciencia, gentileza, bondad, fidelidad, humildad y control propio.", "verseRef": "Gálatas 5:22-23 (NTV)", "context": "Gálatas fue escrita en respuesta a una crisis: maestros judeo-cristianos argumentaban que la fe en Cristo no era suficiente — también había que cumplir la ley. Pablo responde: eso es abandonar el evangelio.\n\nEn capítulo 5, contrasta las \"obras de la carne\" con el \"fruto del Espíritu\". La distinción gramatical es clave: las obras están en plural (actividades que uno produce por esfuerzo); el fruto está en singular (karpos) — una unidad de la que brotan múltiples expresiones.\n\nEnkrateia (ἐγκράτεια) — \"dominio propio\" — literalmente \"el que se tiene a sí mismo\". En la filosofía estoica era una virtud alcanzable solo por los más disciplinados. Pablo la reubica: no es producto del entrenamiento humano sino del Espíritu Santo.", "teaching": "El enfoque cultural del dominio propio es la fuerza de voluntad: un recurso que se agota bajo presión, que falla cuando estás cansada o estresada.\n\nEl fruto del Espíritu funciona diferente. No se agota porque no viene de ti — viene del Espíritu que vive en ti. Tu parte es crear las condiciones en las que crece. Un árbol junto al río no produce fruto por esforzarse — produce fruto porque está plantado en el lugar correcto.\n\nEsto cambia la pregunta: no es \"¿cómo me controlo más?\" sino \"¿qué está obstruyendo el flujo del Espíritu en esta área de mi vida?\"", "application": "¿En qué área de tu vida sientes más falta de dominio propio (redes, palabras, emociones, tiempo)? ¿Qué hábito o condición obstruye el flujo del Espíritu ahí? ¿Qué puedes cambiar esta semana?", "prayer": "Espíritu Santo, produce en mí fruto de dominio propio. No en mi fuerza sino en la tuya. Muéstrame las condiciones que necesito crear para que tú puedas trabajar. Amén.", "phrase": "El dominio propio no es fuerza de voluntad que se agota — es fruto del Espíritu que crece cuando permanezco conectada a la vid.", "reading": "Gálatas 5:16-26", "journal": ["¿En qué área de tu vida sientes más falta de dominio propio ahora mismo?", "¿Qué condición o hábito está obstruyendo el flujo del Espíritu ahí?", "¿Qué cambio concreto puedes hacer esta semana?"]}, {"day": 19, "date": "Domingo, 19 de julio", "week": 3, "title": "Renueva tu mente", "ref": "Romanos 12:1-2", "verse": "No imiten las conductas ni las costumbres de este mundo, más bien dejen que Dios los transforme en personas nuevas al cambiarles la manera de pensar.", "verseRef": "Romanos 12:2 (NTV)", "context": "Pablo escribe Romanos desde Corinto (~57 d.C.). Después de once capítulos exponiendo la doctrina de la justificación, el capítulo 12 marca un giro: toda la teología anterior conecta ahora con las implicaciones prácticas.\n\n\"No se conformen\" usa el griego syschēmatizō — de schēma (forma exterior). No permitas que el sistema de valores del mundo te moldee desde afuera.\n\n\"Sean transformados\" usa metamorphoō (μεταμορφόω) — la misma palabra de la Transfiguración de Jesús (Mateo 17:2), cuando su apariencia cambió desde adentro hacia afuera. La metamorfosis ocurre desde el interior.\n\nEl mecanismo es la anakainōsis tou noos — renovación de la mente. No un evento instantáneo sino un proceso gradual de reconfiguración.", "teaching": "El cerebro humano es más plástico de lo que pensamos. Los patrones de pensamiento repetidos crean vías neuronales — surcos por donde el pensamiento fluye con menos esfuerzo cada vez. Los pensamientos habituales de miedo, insuficiencia o comparación se vuelven más automáticos.\n\nLa buena noticia: lo mismo ocurre en sentido contrario. La exposición repetida a la verdad de Dios crea nuevas vías neuronales. Los hábitos de esta semana son entradas de información que van reemplazando los patrones viejos.\n\nEl resultado que promete Pablo: \"aprenderán a conocer la voluntad de Dios\" — no solo en las grandes decisiones, sino en el discernimiento cotidiano.", "application": "Identifica un patrón de pensamiento recurrente que no viene de Dios (insuficiencia, comparación, miedo al futuro). Cuando aparezca hoy, no pelees con él — reemplázalo con un versículo específico de esta semana.", "prayer": "Señor, renueva mi mente. No solo mis acciones — lo que pienso automáticamente. Que la verdad de tu Palabra vaya reemplazando los patrones viejos. Transforma desde adentro lo que yo no puedo cambiar desde afuera. Amén.", "phrase": "Cambio de vida empieza en cambio de mente — y eso es exactamente lo que Dios promete hacer en mí.", "reading": "Romanos 12:1-8", "journal": ["¿Cuál es el patrón de pensamiento que reconoces que no viene de Dios?", "¿Qué versículo específico usarás para reemplazarlo cuando aparezca?"]}, {"day": 20, "date": "Lunes, 20 de julio", "week": 3, "title": "La comunidad que sostiene", "ref": "Hebreos 10:19-25", "verse": "Y no dejemos de congregarnos, como lo hacen algunos, sino animémonos unos a otros, sobre todo ahora que el día de su regreso se acerca.", "verseRef": "Hebreos 10:25 (NTV)", "context": "La carta a los Hebreos fue escrita a creyentes judíos que consideraban abandonar la fe — en parte por presión social y persecución. El autor escribe para mostrarles que Cristo es superior al sistema levítico.\n\nLos tres imperativos de v.19-25 están en plural, dirigidos a la comunidad, no al individuo. \"Animémonos\" usa parakaleō (παρακαλέω) — la misma raíz que Jesús usa para el Espíritu Santo: Paráclito, el que viene al lado.\n\n\"No dejemos de congregarnos\" sugiere que algunos ya lo estaban haciendo. El aislamiento espiritual era una tentación real en el siglo I, como lo sigue siendo en el XXI.", "teaching": "El mito del \"cristiano solitario\" no tiene base bíblica. De Génesis a Apocalipsis, la narrativa bíblica entera es comunitaria.\n\nEl aislamiento espiritual es peligroso no porque Dios deje de estar presente, sino porque hay formas en que Dios trabaja a través de la comunidad que no puede reemplazar la soledad. El estímulo de alguien que dice \"yo también lo he sentido\". La responsabilidad compartida de quien te conoce de verdad.\n\nLa comunidad auténtica no es ir a un servicio una vez por semana. Es conocer y ser conocida. Es tener personas que noten cuando no estás.", "application": "¿A quién puedes animar hoy específicamente? Envía un mensaje, haz una llamada, ora por alguien por nombre. Escribe quién es y qué harás:", "prayer": "Señor, ayúdame a no intentar caminar sola. Que sepa recibir comunidad y ofrecerla. Que en mi vida haya personas que me conozcan de verdad. Amén.", "phrase": "La fe no está diseñada para vivirse sola — la comunidad no es extra, es parte del diseño.", "reading": "Hebreos 10:19-25", "journal": ["¿A quién vas a animar hoy? Escribe su nombre y exactamente qué harás.", "¿Hay alguien con quien necesitas dar el primer paso hacia la honestidad real?"]}, {"day": 21, "date": "Martes, 21 de julio", "week": 3, "title": "Reposo y reflexión", "ref": "Salmo 1:1-3", "verse": "Son como árboles plantados a la orilla de un río, que siempre dan fruto en su tiempo. Sus hojas nunca se marchitan, y prosperan en todo lo que hacen.", "verseRef": "Salmo 1:3 (NTV)", "context": "El Salmo 1 fue puesto deliberadamente al inicio de todo el Salterio como una declaración de principios. Antes de los lamentos, los himnos y los salmos reales, el editor dice: aquí está el fundamento.\n\nLa imagen del árbol plantado junto a corrientes de agua es una imagen de vida en el Medio Oriente donde el agua es escasa. Un árbol junto al río no depende de las lluvias — tiene acceso permanente a una fuente que no se agota.\n\nEl verbo hāgāh (meditar, v.2) es el mismo de Josué 1:8 — el murmullo continuo. La palabra ʾašrê que abre el salmo — \"Bienaventurado\" — está en plural en hebreo: la plenitud que describe es multidimensional.", "teaching": "Esta semana exploraste seis hábitos: oración, meditación en la Palabra, gratitud, dominio propio, renovación de la mente, comunidad. Ninguno es magia. Todos comparten una lógica común: son formas de mantenerte plantada junto a la fuente correcta.\n\nEl árbol de Salmo 1 no da fruto por esforzarse — da fruto porque sus raíces llegan al agua. Tu parte no es producir fruto; tu parte es asegurarte de que tus raíces lleguen a Dios.\n\nHoy, en el día de reposo, hay espacio para mirar atrás y notar: ¿dónde estoy más enraizada? ¿qué está bloqueando las raíces?", "application": "Revisa los hábitos de esta semana. ¿Cuál se te hizo más fácil? ¿Cuál más difícil? ¿Cuál quieres comprometerte a practicar durante el resto de julio?", "prayer": "Señor, quiero ser ese árbol plantado junto a tu corriente. Que los hábitos que cultivo sean raíces reales, no actuación religiosa. Gracias porque mientras yo intento acercarme, tú ya estás ahí. Amén.", "phrase": "Mis hábitos espirituales no me dan el amor de Dios — me acercan a la corriente que ya fluye desde siempre.", "reading": "Salmo 1:1-6", "journal": ["¿Cuál hábito de esta semana se te hizo más fácil? ¿Cuál más difícil?", "¿A cuál te comprometes las próximas dos semanas con más intencionalidad?"]}, {"day": 22, "date": "Miércoles, 22 de julio", "week": 4, "title": "Abba Padre", "ref": "Romanos 8:14-17", "verse": "Pues todos los que son guiados por el Espíritu de Dios son hijos de Dios. Ahora lo llamamos «Abba, Padre».", "verseRef": "Romanos 8:14-15 (NTV)", "context": "La palabra Abba (אַבָּא) es arameo — el idioma que hablaba Jesús en su vida diaria. La usó en el momento de mayor angustia: en Getsemaní, la noche antes de la crucifixión: \"Abba, Padre, todo es posible para ti\" (Marcos 14:36).\n\nEn el contexto judío del siglo I, \"Abba\" era usada por los niños pequeños para dirigirse a su padre — la forma íntima y familiar, equivalente a \"papi\" en español. Que Jesús usara esta palabra para dirigirse a Dios era teológicamente escandaloso.\n\nY la imagen de la adopción (huiothesia) es rica: en Roma, la adopción era uno de los actos legales más vinculantes. El hijo adoptado recibía los mismos derechos que el natural, y la adopción era irrevocable.", "teaching": "No han recibido un espíritu de esclavitud para volver al miedo — esta frase describe dos formas de relacionarse con Dios. Una basada en el miedo (el esclavo que sirve por temor al castigo) y otra basada en el amor (el hijo que vive desde la seguridad de ser amado).\n\nMuchos creyentes viven en \"orfandad espiritual\": técnicamente adoptados pero emocionalmente funcionando como huérfanos. Sirven a Dios por miedo a su desaprobación. Nunca logran relajarse en su presencia.\n\nLa intimidad que Dios ofrece es diferente: la del niño que entra al cuarto de su padre sin pedir cita. \"Abba\" no es una palabra de protocolo — es una palabra de confianza.", "application": "Hoy, en tu momento de oración, empieza solo con esta palabra: \"Abba.\" Quédate en silencio por un minuto. ¿Qué sentiste? ¿Fue fácil o difícil? ¿Qué te dice eso sobre cómo te relacionas con Dios?", "prayer": "Abba Padre, gracias porque soy tu hija — no tu empleada, no tu visitante. Gracias porque me adoptaste con todos los derechos y nada puede quitarme ese nombre. Enséñame a vivir desde esa realidad. Amén.", "phrase": "No soy empleada de Dios — soy su hija adoptada, con todos los derechos y para siempre.", "reading": "Romanos 8:12-17", "journal": ["¿Qué sentiste cuando dijiste \"Abba\" en silencio? Descríbelo.", "¿En qué área de tu vida sigues funcionando como empleada en lugar de como hija amada?"]}, {"day": 23, "date": "Jueves, 23 de julio", "week": 4, "title": "Orar en lo secreto", "ref": "Mateo 6:6", "verse": "Pero tú, cuando ores, apártate a solas, cierra la puerta detrás de ti y ora a tu Padre en privado. Entonces, tu Padre, quien todo lo ve, te recompensará.", "verseRef": "Mateo 6:6 (NTV)", "context": "Volvemos a Mateo 6:6, pero desde el ángulo de la promesa. La palabra tameion — \"cuarto secreto\" — describe el almacén privado de una casa, donde se guardaba lo más valioso. Jesús dice que el lugar más privado de tu vida es donde encuentras al Padre.\n\nLa recompensa que promete Jesús no se detalla. La recompensa de la oración secreta no puede ser material porque nadie más sabe que oraste. La recompensa es relacional: en el cuarto cerrado, encuentras al Padre de una manera que no encuentras en ningún otro lugar.\n\nHay una teología del ocultamiento: \"el que ve en lo secreto\" implica que Dios habita particularmente en los espacios que el mundo no ve.", "teaching": "Hay cosas que solo ocurren en el cuarto cerrado. No porque Dios esté más presente ahí — sino porque tú estás más presente. Sin audiencia, sin imagen que mantener.\n\nLa tentación de la generación digital es exactamente la contraria: hacer públicas hasta las experiencias espirituales, postear la oración. No hay nada malo en compartir. Pero si la vida de oración se vuelve material para las redes, algo se ha perdido.\n\nLo que construyes en privado con Dios es lo que sostiene todo lo demás. La fe visible viene de la intimidad invisible.", "application": "Esta semana, elige un lugar físico específico para tu oración privada. Puede ser un rincón de tu habitación, una silla, un espacio en el balcón. Nómbralo. Comprométete a ir ahí al menos 5 veces esta semana.", "prayer": "Padre, enséñame a amar el cuarto cerrado. A no buscar audiencia para mi vida espiritual. Que lo que construyo en privado contigo sea lo más real de todo lo que soy. Amén.", "phrase": "La intimidad con Dios se construye en los momentos que nadie más ve — y esos son los más reales de todos.", "reading": "Mateo 6:1-18", "journal": ["¿Cuándo y dónde será tu cuarto cerrado esta semana? Anótalo en tu agenda ahora.", "¿Qué pensamientos o distracciones suelen aparecer cuando intentas orar?"]}, {"day": 24, "date": "Viernes, 24 de julio", "week": 4, "title": "Conocida por su nombre", "ref": "Juan 10:11-15", "verse": "Yo soy el buen pastor; conozco a mis ovejas, y ellas me conocen a mí, así como mi Padre me conoce a mí y yo conozco al Padre.", "verseRef": "Juan 10:14-15 (NTV)", "context": "En el mundo mediterráneo del siglo I, un pastor en Israel caminaba delante de sus ovejas, las llamaba por nombre y ellas reconocían su voz entre cientos.\n\nJesús usa ginōskō (γινώσκω) — conocimiento experiencial y relacional, que crece con el tiempo. No es solo conocer datos sobre alguien — es conocer a alguien de la manera en que conoces a una persona íntima.\n\nLa profundidad se compara con el conocimiento mutuo entre el Padre y el Hijo: \"así como mi Padre me conoce a mí\". Esta es la escala de la intimidad que Jesús ofrece — no una relación religiosa de bajo nivel, sino algo comparable a la comunión trinitaria.", "teaching": "Ser completamente conocida y seguir siendo amada es lo que todos más anhelamos y más tememos. Por eso muchos mantienen distancias cuidadosas incluso con las personas más cercanas.\n\nJesús dice que te conoce por nombre, por voz, por particularidades. El conocimiento que Él tiene de ti no es la versión genérica de \"cristiana\": es la versión específica de quién eres, con tu historia, tus miedos, tus vergüenzas íntimas.\n\nY te conoce así y sigue eligiéndote.", "application": "Escribe: \"Jesús me conoce — [algo que sabes que Él ve en ti que la mayoría no ve, bueno o difícil]\". Deja que el conocimiento de Jesús sea más real que tu autocrítica. ¿Qué cambia si lo crees?", "prayer": "Jesús, gracias porque me conoces a mí — no la versión que muestro en público, sino la real. Gracias porque ese conocimiento no te alejó sino que te acercó. Que yo te conozca a ti de la misma manera. Amén.", "phrase": "No soy un número en la lista de Dios — soy conocida por nombre por el Buen Pastor que eligió ir a buscarme.", "reading": "Juan 10:1-18", "journal": ["Escribe: \"Jesús me conoce y me llama por nombre. Él conoce...\" (completa con algo tuyo que casi nadie ve).", "¿Qué cambia en tu día saber que eres conocida así?"]}, {"day": 25, "date": "Sábado, 25 de julio", "week": 4, "title": "La oración de Jesús por ti", "ref": "Juan 17:20-26", "verse": "No te pido solo por estos discípulos, sino también por todos los que creerán en mí por el mensaje de ellos.", "verseRef": "Juan 17:20 (NTV)", "context": "Juan 17 es la \"oración sumo-sacerdotal\" de Jesús — la más larga registrada en los evangelios. Ocurre la noche antes de la crucifixión. Jesús sabe lo que viene.\n\nEn los versículos 20-26, amplía la oración más allá de los Once. \"No te pido solo por estos discípulos, sino también por todos los que creerán en mí por el mensaje de ellos.\" Sabía que habría generaciones de creyentes que leerían este texto. Tú eres una de ellas.\n\nLa petición final es la más íntima: \"quiero que los que me diste estén conmigo donde yo estoy.\" El verbo \"quiero\" (thelō) expresa deseo profundo. La meta no es un lugar: es la compañía. Jesús quiere tu compañía.", "teaching": "Jesús pensó en ti específicamente esa noche. No en una categoría vaga de \"futuros creyentes\" — sino en ti, que leerías esto algún día. Te incluyó en su oración con la misma intención con que un padre ora por su hijo que aún no ha nacido.\n\nEsto cambia la oración que haces tú. No oras hacia un Dios que no sabe que existes. Oras a un Padre cuyo Hijo ya oró por ti antes de que supieras que necesitabas oración.\n\nLa meta no es un lugar: es la compañía. Jesús quiere tu compañía.", "application": "Lee Juan 17:20-26 despacio, en voz alta, como si fuera una carta dirigida a ti. Detente en cada frase. ¿Cuál te impacta más? Escríbela y explica por qué.", "prayer": "Jesús, gracias porque pensaste en mí esa noche antes de la cruz. Gracias porque tu oración me incluyó. Que yo sea alguien que quiere estar donde tú estás — no solo en el futuro sino ahora. Amén.", "phrase": "Jesús me incluyó en su oración la noche antes de morir — quiere mi compañía, no solo mi obediencia.", "reading": "Juan 17:1-26", "journal": ["Lee Juan 17:20-26 en voz alta. ¿Cuál frase te detuvo más tiempo? ¿Por qué?", "¿Qué significa para ti que Jesús pensó en ti específicamente esa noche antes de la cruz?"]}, {"day": 26, "date": "Domingo, 26 de julio", "week": 4, "title": "Permanece en mí", "ref": "Juan 15:1-8", "verse": "Permanezcan en mí, y yo permaneceré en ustedes. Pues una rama no puede producir fruto si la cortan de la vid, y ustedes tampoco pueden ser fructíferos a menos que permanezcan en mí.", "verseRef": "Juan 15:4 (NTV)", "context": "La imagen de la vid es una de las más arraigadas de toda la Escritura. En el AT, la vid era el símbolo de Israel (Isaías 5:1-7, Salmo 80). Pero siempre con la misma tragedia: Israel como vid que no dio el fruto esperado.\n\nJesús hace una afirmación radical: \"Yo soy la vid verdadera\" — no Israel como nación, sino Él mismo. El verbo menō (μένω) aparece once veces en Juan 15:1-11. Implica residencia permanente, no visita ocasional.\n\nLa fisiología de la vid es relevante: una rama separada puede mantenerse verde por días. Desde afuera parece viva. Pero el proceso de muerte comenzó en el momento en que fue cortada.", "teaching": "\"Sin mí nada podéis hacer\" — no es un reclamo divino de poder sino una descripción de cómo fue diseñada la creación: el fruto significativo viene de la conexión con la fuente correcta.\n\nPermanecer en Cristo no es pasivo. El verbo está en imperativo: \"¡Permanezcan!\" Hay una decisión activa de mantenerse conectada, de resistir la gravedad del mundo que nos atrae hacia otros centros.\n\nY la promesa es doble: \"permanezcan en mí, y yo permaneceré en ustedes\". Tu permanencia en Él activa su permanencia en ti.", "application": "¿Qué acción concreta puedes tomar hoy para \"permanecer\" activamente en Cristo — no en teoría sino en práctica? Escoge una de los hábitos de esta semana y hazla hoy. Escríbela con el horario de cuándo la harás.", "prayer": "Jesús, quiero permanecer en ti — no visitarte de vez en cuando sino residir en ti. Que mis hábitos diarios sean formas de mantenerme conectada a la vid. Que el fruto de mi vida venga de ti. Amén.", "phrase": "El fruto no viene del esfuerzo — viene de permanecer conectada a la fuente que nunca se agota.", "reading": "Juan 15:1-17", "journal": ["¿Qué acción concreta tomarás hoy para \"permanecer\" activamente? Escribe la hora.", "¿Qué te arrastra hacia afuera de esa conexión? Identifícalo."]}, {"day": 27, "date": "Lunes, 27 de julio", "week": 4, "title": "Busca primero su reino", "ref": "Mateo 6:25-34", "verse": "Busquen el reino de Dios por encima de todo lo demás y lleven una vida justa, y él les dará todo lo que necesiten.", "verseRef": "Mateo 6:33 (NTV)", "context": "El contexto inmediato es la enseñanza de Jesús sobre la ansiedad. La palabra merimnāō (μεριμνάω) — \"preocuparse\" — viene de merizo (dividir) + nous (mente): la ansiedad es una mente dividida, tirada en múltiples direcciones.\n\nJesús no condena la ansiedad — la entiende. Las ilustraciones de los pájaros y las flores abren una teología de la provisión: si el Padre cuida de lo que no le puede pedir nada, cuánto más cuidará de sus hijos.\n\n\"Busquen primero\" usa zēteite prōton: \"primero\" no describe solo prioridad en el tiempo sino primacía en el orden de importancia. El \"reino de Dios\" en Mateo no es solo el cielo futuro — es el reinado de Dios manifestándose aquí y ahora.", "teaching": "La ansiedad es el resultado natural de un corazón sin centro. Cuando el centro de gravedad de tu vida son las circunstancias, vives a merced de su vaivén. Cuando hay algo que permanece estable en el centro — el reino de Dios — las circunstancias no tienen el mismo poder.\n\n\"Él les dará todo lo que necesiten\" es una promesa de providencia: las necesidades reales serán provistas. No todas las que queremos — todas las que necesitamos.\n\nBuscar primero el reino es una orientación que se renueva constantemente. Cada mañana hay una pregunta previa: ¿lo primero hoy es su reino o son mis circunstancias?", "application": "Lista tus principales preocupaciones de esta semana. Al lado de cada una escribe: \"Padre, ¿cómo se ve tu reino en esto?\" No para tener respuestas inmediatas — para reorientar el corazón.", "prayer": "Padre, ayúdame a buscar primero tu reino. Que cuando la ansiedad aparezca, la primera pregunta no sea \"¿cómo lo resuelvo?\" sino \"¿dónde estás tú en esto?\" Amén.", "phrase": "Cuando busco primero su reino, todo lo demás encuentra su lugar correcto — es promesa, no teoría.", "reading": "Mateo 6:25-34", "journal": ["Escribe tus 3 principales preocupaciones de esta semana. Al lado de cada una: \"¿Dónde está Dios en esto?\"", "¿Qué estás poniendo en primer lugar realmente, no en teoría?"]}, {"day": 28, "date": "Martes, 28 de julio", "week": 4, "title": "Reposo y reflexión", "ref": "Salmo 27:1-4", "verse": "Lo único que le pido al SEÑOR — lo que más anhelo — es vivir en la casa del SEÑOR todos los días de mi vida, deleitándome en la perfección del SEÑOR.", "verseRef": "Salmo 27:4 (NTV)", "context": "El Salmo 27 es singular: los primeros seis versículos expresan confianza victoriosa, mientras los versículos 7-14 son una oración angustiada. Fe que afirma y fe que lucha conviven en el mismo salmo.\n\nEl versículo 4 es el momento central: en medio de todo, David identifica una sola cosa. ʾaḥat šāʾaltî en hebreo: \"una sola cosa he pedido.\" No doce cosas — una.\n\nLa palabra la'ot — \"contemplar\" — describe una mirada sostenida y placentera, la forma en que un amante mira a la persona amada. No el turista que pasa rápido — el que se sienta y mira sin prisa.", "teaching": "Esta semana exploraste la intimidad con el Padre: llamarlo Abba, orar en lo secreto, ser conocida por nombre, estar en la oración de Jesús, permanecer en la vid, buscar primero su reino.\n\nHoy cierra con la pregunta más importante de David: ¿qué es lo que más anhelas? No lo que deberías anhelar — lo que realmente anhelas cuando eres honesta.\n\nLa intimidad con Dios no se produce por obligación. Se produce cuando el corazón genuinamente quiere estar cerca de Él.", "application": "Escribe honestamente: ¿qué es lo que más anhelas en este momento de tu vida? ¿Cómo se compara con el anhelo de David por la presencia de Dios? No hay respuesta correcta — solo honestidad.", "prayer": "Señor, pido que desee lo que David deseaba. Que la intimidad contigo sea el fin, no el medio. Que lo que más quiera sea estar en tu presencia. Amén.", "phrase": "La intimidad con Dios no es medio para otro fin — es el fin mismo, y el más satisfactorio.", "reading": "Salmo 27:1-14", "journal": ["¿Qué es lo que más anhelas en este momento de tu vida? Escríbelo con honestidad.", "¿Cómo se compara ese anhelo con el de David: \"vivir en la casa del Señor\"?"]}, {"day": 29, "date": "Miércoles, 29 de julio", "week": 5, "title": "El Consolador prometido", "ref": "Juan 14:15-21", "verse": "Y yo le pediré al Padre, y él les dará otro Abogado Defensor, quien estará con ustedes para siempre. Me refiero al Espíritu Santo, quien guía a toda la verdad.", "verseRef": "Juan 14:16-17 (NTV)", "context": "Juan 14 ocurre en el aposento alto, la noche antes de la crucifixión. Jesús anuncia su partida y los discípulos están desestabilizados. La sección 14-16 es su respuesta al miedo: no se van a quedar solos.\n\nParaklētos (Παράκλητος) — \"Abogado Defensor\" — es prácticamente intraducible. Literalmente: \"el que es llamado al lado de\" para ayudar, defender, consolar, abogar.\n\nLa palabra \"otro\" es allos (ἄλλος) — otro del mismo tipo, no de tipo diferente. El Espíritu Santo no es un sustituto inferior de Jesús.\n\nLa distinción más radical: antes el Espíritu estaba \"con\" ellos; después de Pentecostés vendría a vivir \"en\" ellos. La intimidad subió de nivel.", "teaching": "El Espíritu Santo es probablemente la Persona de la Trinidad menos conocida. Para algunos es una fuerza impersonal. Para otros, irrelevante en lo práctico.\n\nPero Jesús lo describe como un Paraklētos: una Persona que toma posición activa a tu lado. No un poder que invocas en emergencias — una Persona que ya está ahí, que ya habita en ti.\n\nLa promesa es de permanencia: \"estará con ustedes para siempre.\" No abandona cuando fallas, no se retira cuando dudas. Conocer al Espíritu Santo es aprender a notar quién ya está ahí.", "application": "Hoy, antes de tomar una decisión (grande o pequeña), di en voz baja: \"Espíritu Santo, tú estás aquí. Guíame.\" Al final del día, escribe un momento en que sentiste que lo reconociste.", "prayer": "Espíritu Santo, gracias porque estás aquí — a mi lado, en mí. No eres abstracto ni lejano. Eres real y personal. Que aprenda a reconocerte y seguirte cada día. Amén.", "phrase": "El Espíritu Santo no es una fuerza que invoco — es una Persona que siempre está a mi lado.", "reading": "Juan 14:15-27", "journal": ["¿Hubo un momento hoy donde sentiste al Espíritu guiándote? Descríbelo.", "¿Qué decisión quieres tomar diferente mañana, reconociéndolo presente?"]}, {"day": 30, "date": "Jueves, 30 de julio", "week": 5, "title": "El Espíritu que intercede", "ref": "Romanos 8:26-28", "verse": "Y el Espíritu Santo nos ayuda en nuestra debilidad. Nosotros no sabemos qué quiere Dios que le pidamos en oración, pero el Espíritu Santo ora por nosotros con gemidos que no pueden expresarse con palabras.", "verseRef": "Romanos 8:26 (NTV)", "context": "Romanos 8 habla de las \"primicias del Espíritu\" (v.23) — el Espíritu como anticipo de la redención completa. Toda la creación gime (v.22), los creyentes gemimos (v.23), y ahora el Espíritu mismo intercede con \"gemidos que no pueden expresarse\".\n\nLa palabra huperentynchanei es única en el NT: \"hyper\" (superlativamente) + \"en\" + \"tynchanō\" (alcanzar). El Espíritu intercede con una profundidad que va más allá de lo articulable.\n\nLos \"gemidos que no pueden expresarse\" describen comunicación que trasciende el lenguaje humano. No es que Dios no entienda el idioma — es que hay realidades del corazón tan profundas que ningún idioma las alcanza.", "teaching": "Hay momentos donde las palabras no alcanzan. El dolor es demasiado grande. La situación demasiado compleja. Abres la boca para orar y no sale nada coherente.\n\nPablo no dice que eso es un problema espiritual. Dice que para eso exactamente está el Espíritu. Cuando tú no tienes vocabulario, el Espíritu tiene el suyo. Lleva al Padre lo que tú no puedes articular.\n\n\"Sabemos que Dios hace que todas las cosas cooperen para el bien\" (v.28) viene justo después. Las cosas cooperan para bien porque hay alguien que está orando incluso cuando tú no puedes.", "application": "La próxima vez que no sepas cómo orar, siéntate en silencio por 3 minutos y di solo: \"Espíritu Santo, tú intercede por mí en esto.\" Escribe hoy una situación donde no sabes cómo orar, y entrégasela al Espíritu:", "prayer": "Espíritu Santo, gracias porque oras por mí cuando no tengo palabras. Hoy te entrego lo que no puedo articular. Confío en que tú lo llevas al Padre perfectamente. Amén.", "phrase": "Cuando no tengo palabras, el Espíritu tiene las suyas — y ora por mí con una profundidad que yo no alcanzo.", "reading": "Romanos 8:18-30", "journal": ["¿Qué situación en tu vida ahora mismo no sabes cómo orar? Escríbela y entrégasela.", "¿Cómo cambia tu perspectiva saber que el Espíritu intercede por ti cuando no tienes palabras?"]}, {"day": 31, "date": "Viernes, 31 de julio", "week": 5, "title": "Sellada con el Espíritu", "ref": "Efesios 1:11-14", "verse": "Y cuando creyeron en Cristo, Dios los identificó como suyos dándoles el Espíritu Santo. El Espíritu es la garantía de que Dios cumplirá su promesa.", "verseRef": "Efesios 1:13-14 (NTV)", "context": "Cerramos julio con el mismo libro con que comenzamos la semana 2: Efesios. La carta que habla de nuestra identidad como obra maestra también habla del sello que marca esa identidad como permanente.\n\nSphragizō (σφραγίζω) — \"sellar\" — tenía varios usos: los reyes sellaban documentos para autenticar su autoridad, los comerciantes sellaban mercancías para marcar propiedad. Un sello era una declaración: esto pertenece a alguien poderoso.\n\nArrabōn (ἀρραβών) — \"garantía\" o \"arras\" — era un término comercial: el depósito inicial que comprometía legalmente a un comprador, el pago que garantizaba que la transacción se completaría. El Espíritu no es la totalidad de la herencia — es el anticipo que garantiza que llegará.", "teaching": "Julio termina con esta promesa: estás sellada. No condicionalmente — sellada. El Espíritu que vive en ti es la declaración divina de que perteneces a Dios, que Él completará lo que comenzó.\n\nY eres el anticipo. Todo lo que has experimentado de Dios este mes es solo el depósito inicial de una relación que se mueve hacia algo que Juan llama \"morar con Él\" de manera permanente y completa (Apocalipsis 21:3).\n\nJulio no fue perfecto. El sello no depende de tu consistencia — depende de su fidelidad. Dios no retira el sello cuando fallas. Lo reafirma.", "application": "Cierra julio escribiendo lo que Dios hizo en ti este mes — no lo que lograste tú, sino lo que Él hizo. Una verdad que se asentó. Un hábito que comenzó. Una imagen de Dios que cambió. Un momento de su presencia.", "prayer": "Padre, gracias por julio. Gracias porque el Espíritu me sella como tuya — en los días buenos y en los que fallé. Lo que comenzaste en mí este mes, termínalo. Lo que plantaste, riégalo. En el nombre de Jesús, amén.", "phrase": "El Espíritu que vive en mí es el anticipo de todo lo que Dios prometió — y Él siempre cumple lo que promete.", "reading": "Efesios 1:3-14", "journal": ["¿Qué hizo Dios en ti este mes? No lo que lograste — lo que Él hizo.", "¿Qué verdad nueva sobre Dios se plantó en ti en julio?", "¿Qué le quieres pedir a Dios para agosto?"]}];
const WI    = {"2": {"verse": "\"Eres preciosa a mis ojos, eres honorable y yo te amo.\"", "ref": "Isaías 43:4 (NTV)", "text": "Vivimos en un mundo que define el valor por la apariencia y los logros. Esta semana la Escritura te habla diferente: tu valor no se construye, se recibe. Antes de que hicieras nada, ya eras más valiosa que las joyas. Esta es la verdad que transforma: no tienes que ganar lo que ya tienes."}, "3": {"verse": "\"Dejen que Dios los transforme en personas nuevas al cambiarles la manera de pensar.\"", "ref": "Romanos 12:2 (NTV)", "text": "La vida espiritual no es una lista de reglas — es un conjunto de hábitos que nos forman a imagen de Cristo. Esta semana exploramos disciplinas concretas: oración, Palabra, gratitud, dominio propio, mente renovada, comunidad. No para ganarnos el amor de Dios, sino porque ya lo recibimos."}, "4": {"verse": "\"Lo único que le pido al SEÑOR es vivir en su casa todos los días de mi vida.\"", "ref": "Salmo 27:4 (NTV)", "text": "Conocer sobre Dios no es lo mismo que conocer a Dios. Esta semana profundizamos en la intimidad real con el Padre — no como empleadas cumpliendo obligaciones, sino como hijas amadas que quieren estar cerca de quien las ama primero."}, "5": {"verse": "\"Y yo le pediré al Padre, y él les dará otro Abogado Defensor, quien estará con ustedes para siempre.\"", "ref": "Juan 14:16 (NTV)", "text": "Antes de partir, Jesús no nos dejó solas. Nos dejó al Consolador: el Espíritu Santo. No es una fuerza abstracta — es una Persona que habita en ti, te guía, intercede por ti y te sella como propiedad de Dios."}};

const MONTH_ID    = 'julio-2026';
const MONTH_NAME  = 'Julio 2026';
const MONTH_THEME = 'Identidad, hábitos e intimidad con Dios';
const ANCHOR_VERSE = '"Vengan a mí todos los que están cansados y llevan cargas pesadas, y yo les daré descanso."';
const ANCHOR_REF   = 'Mateo 11:28 (NTV)';

  primary: '#5A86CB',  /* Silver Lake Blue   */
  cherry:  '#F2AEBC',  /* Cherry Blossom     */

};
