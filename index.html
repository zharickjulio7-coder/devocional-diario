/* ─── STATE ─────────────────────────────────────────── */
let completed = new Set(), notes = {}, applications = {};
let currentUser = null, skipAuth = false;
let auth, db;

/* ─── FIREBASE ──────────────────────────────────────── */
const FIREBASE_CONFIG = {
  apiKey:            "TU_API_KEY",
  authDomain:        "TU_PROYECTO.firebaseapp.com",
  projectId:         "TU_PROYECTO_ID",
  storageBucket:     "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId:             "TU_APP_ID"
};
const FIREBASE_READY = FIREBASE_CONFIG.apiKey !== "TU_API_KEY";

function initFirebase() {
  if (!FIREBASE_READY) { loadLocal(); renderHome_(); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
    auth.onAuthStateChanged(onAuthChange);
  } catch(e) { loadLocal(); renderHome_(); }
}

async function onAuthChange(user) {
  currentUser = user;
  updateNavUser();
  if (user) { showLoading(); await loadFromFirestore(user.uid); render(location.hash.replace('#','') || 'home'); }
  else if (skipAuth) { loadLocal(); render(location.hash.replace('#','') || 'home'); }
  else { renderAuth(); }
}

async function doSignIn(e,p)  { await auth.signInWithEmailAndPassword(e,p); }
async function doSignUp(e,p)  { await auth.createUserWithEmailAndPassword(e,p); }
async function doSignOut()    { if(auth) await auth.signOut(); currentUser=null; completed=new Set(); notes={}; applications={}; updateNavUser(); if(FIREBASE_READY){skipAuth=false;renderAuth();}else renderHome_(); }
async function doReset(e)     { await auth.sendPasswordResetEmail(e); }

/* ─── FIRESTORE ─────────────────────────────────────── */
async function loadFromFirestore(uid) {
  try {
    const doc = await db.collection('usuarios').doc(uid).collection('devocional').doc(MONTH_ID).get();
    if (doc.exists) { const d=doc.data(); completed=new Set(d.completados||[]); notes=d.notas||{}; applications=d.aplicaciones||{}; }
    saveLocal();
  } catch(e) { loadLocal(); }
}

let _st;
function scheduleSave() { clearTimeout(_st); _st=setTimeout(saveToFirestore,1800); }
async function saveToFirestore() {
  if (!currentUser||!db) { saveLocal(); return; }
  try {
    await db.collection('usuarios').doc(currentUser.uid).collection('devocional').doc(MONTH_ID).set({
      completados:[...completed], notas:notes, aplicaciones:applications,
      actualizadoEn:firebase.firestore.FieldValue.serverTimestamp()
    });
    saveLocal();
  } catch(e) { saveLocal(); }
}

/* ─── LOCAL ─────────────────────────────────────────── */
function saveLocal() {
  try {
    localStorage.setItem('dev-prog-'+MONTH_ID, JSON.stringify([...completed]));
    localStorage.setItem('dev-notes-'+MONTH_ID, JSON.stringify(notes));
    localStorage.setItem('dev-apps-'+MONTH_ID,  JSON.stringify(applications));
  } catch(e) {}
}
function loadLocal() {
  try {
    const p=localStorage.getItem('dev-prog-'+MONTH_ID);
    const n=localStorage.getItem('dev-notes-'+MONTH_ID);
    const a=localStorage.getItem('dev-apps-'+MONTH_ID);
    if(p) completed=new Set(JSON.parse(p));
    if(n) notes=JSON.parse(n)||{};
    if(a) applications=JSON.parse(a)||{};
    for(let d of DAYS){const old=localStorage.getItem('dev-note-'+MONTH_ID+'-'+d.day);if(old&&!notes[d.day])notes[d.day]=old;}
  } catch(e) {}
}

/* ─── HELPERS ───────────────────────────────────────── */
function getMonthProgress(){return{done:completed.size,total:DAYS.length,pct:Math.round(completed.size/DAYS.length*100)};}
function getWeekProgress(wk){const wd=DAYS.filter(d=>d.week===wk);return{done:wd.filter(d=>completed.has(d.day)).length,total:wd.length};}
function getNextIncompleteDay(){return DAYS.find(d=>!completed.has(d.day))||null;}
function getCurrentDay(){const t=new Date();if(t.getMonth()!==6)return null;return DAYS.find(d=>d.day===t.getDate())||null;}
function wkOf(d){return d<=14?2:d<=21?3:d<=28?4:5;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function paras(t){return(t||'').split('\n\n').map(p=>'<p>'+esc(p)+'</p>').join('');}
function ProgBar(done,total,color){const pct=total?Math.round(done/total*100):0;return'<div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+color+'"></div></div><span class="prog-label">'+done+'/'+total+'</span></div>';}

/* ─── NAV ───────────────────────────────────────────── */
function updateNavUser() {
  const area=document.getElementById('nav-user-area'); if(!area) return;
  if (currentUser) {
    const em=currentUser.email||''; const short=em.length>22?em.slice(0,20)+'…':em;
    area.innerHTML='<div class="nav-user"><span class="nav-user-email">'+esc(short)+'</span><button class="nav-logout" onclick="doSignOut()">Salir</button></div>';
  } else { area.innerHTML=(!FIREBASE_READY||skipAuth)?'':'<button class="nav-link" onclick="renderAuth()">Iniciar sesión</button>'; }
}

/* ─── NAVIGATE ──────────────────────────────────────── */
function navigate(hash){history.pushState(null,'','#'+hash);render(hash);window.scrollTo({top:0,behavior:'smooth'});}
window.addEventListener('popstate',()=>render(location.hash.replace('#','')||'home'));
function renderHome_(){render('home');}
function showLoading(){document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:20px"><div class="spinner"></div><p style="color:#8A8AAB;font-size:16px">Cargando tu devocional...</p></div>';}

function renderAuth() {
  document.getElementById('app').innerHTML=`
<div class="auth-screen page-enter">
  <div class="auth-card glass">
    <div class="auth-brand">
      <div class="auth-brand__icon">🌸</div>
      <h1 class="auth-brand__title">Caminando con Jesús</h1>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Crear cuenta</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div id="form-login">
      <div class="auth-field"><label class="auth-label">Correo</label><input type="email" class="auth-input" id="login-email" placeholder="tu@correo.com" autocomplete="email"></div>
      <div class="auth-field"><label class="auth-label">Contraseña</label><input type="password" class="auth-input" id="login-password" placeholder="Tu contraseña" autocomplete="current-password"></div>
      <div class="auth-forgot"><a href="#" onclick="handleForgot(event)">¿Olvidaste tu contraseña?</a></div>
      <button class="auth-submit" id="btn-login" onclick="handleLogin()">Iniciar sesión</button>
    </div>
    <div id="form-signup" style="display:none">
      <div class="auth-field"><label class="auth-label">Correo</label><input type="email" class="auth-input" id="signup-email" placeholder="tu@correo.com" autocomplete="email"></div>
      <div class="auth-field"><label class="auth-label">Contraseña</label><input type="password" class="auth-input" id="signup-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <div class="auth-field"><label class="auth-label">Confirmar contraseña</label><input type="password" class="auth-input" id="signup-confirm" placeholder="Repite tu contraseña" autocomplete="new-password"></div>
      <button class="auth-submit" id="btn-signup" onclick="handleSignup()">Crear mi cuenta</button>
    </div>
    <div class="auth-or">o</div>
    <div class="auth-skip"><a href="#" onclick="handleSkip(event)">Continuar sin cuenta (solo este dispositivo)</a></div>
  </div>
</div>`;
  document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
  document.getElementById('signup-confirm').addEventListener('keydown',e=>{if(e.key==='Enter')handleSignup();});
}
function switchTab(tab){
  const l=tab==='login';
  document.getElementById('tab-login').className='auth-tab'+(l?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(!l?' active':'');
  document.getElementById('form-login').style.display=l?'':'none';
  document.getElementById('form-signup').style.display=l?'none':'';
  showAuthError('');
}
function showAuthError(msg){const el=document.getElementById('auth-error');if(!el)return;el.textContent=msg;el.className='auth-error'+(msg?' show':'');}
function setAuthLoading(loading){['btn-login','btn-signup'].forEach(id=>{const b=document.getElementById(id);if(b){b.disabled=loading;b.textContent=loading?'Cargando...':id==='btn-login'?'Iniciar sesión':'Crear mi cuenta';}});}
const AUTH_ERRORS={'auth/email-already-in-use':'Este correo ya tiene una cuenta. Inicia sesión.','auth/invalid-email':'El correo no es válido.','auth/weak-password':'La contraseña debe tener al menos 6 caracteres.','auth/user-not-found':'No encontramos una cuenta con ese correo.','auth/wrong-password':'Contraseña incorrecta. Inténtalo de nuevo.','auth/invalid-credential':'Correo o contraseña incorrectos.','auth/too-many-requests':'Demasiados intentos. Espera unos minutos.','auth/network-request-failed':'Sin conexión a internet.'};
function authErrMsg(code){return AUTH_ERRORS[code]||'Ocurrió un error. Inténtalo de nuevo.';}
async function handleLogin(){
  const e=document.getElementById('login-email').value.trim();const p=document.getElementById('login-password').value;
  if(!e||!p){showAuthError('Completa todos los campos.');return;}
  showAuthError('');setAuthLoading(true);
  try{await doSignIn(e,p);}catch(err){showAuthError(authErrMsg(err.code));setAuthLoading(false);}
}
async function handleSignup(){
  const e=document.getElementById('signup-email').value.trim();const p=document.getElementById('signup-password').value;const c=document.getElementById('signup-confirm').value;
  if(!e||!p||!c){showAuthError('Completa todos los campos.');return;}
  if(p!==c){showAuthError('Las contraseñas no coinciden.');return;}
  if(p.length<6){showAuthError('La contraseña debe tener al menos 6 caracteres.');return;}
  showAuthError('');setAuthLoading(true);
  try{await doSignUp(e,p);}catch(err){showAuthError(authErrMsg(err.code));setAuthLoading(false);}
}
async function handleForgot(e){
  e.preventDefault();const email=document.getElementById('login-email').value.trim();
  if(!email){showAuthError('Escribe tu correo arriba para recuperar tu contraseña.');return;}
  try{await doReset(email);showAuthError('');alert('📧 Te enviamos un correo para restablecer tu contraseña.');}catch(err){showAuthError(authErrMsg(err.code));}
}
function handleSkip(e){e.preventDefault();skipAuth=true;loadLocal();render('home');}

/* ════════════════════════════════════════════════════
   COMPONENTS
════════════════════════════════════════════════════ */
function Breadcrumb(items){
  return '<nav class="breadcrumb">'+items.map((it,i)=>i===items.length-1?'<span>'+esc(it.label)+'</span>':'<a href="#" onclick="event.preventDefault();navigate(\''+it.hash+'\')">'+esc(it.label)+'</a><span class="breadcrumb__sep">›</span>').join('')+'</nav>';
}
function GlassSection(icon,label,color,content){
  return '<div class="day-section"><div class="day-section__header"><div class="day-section__bar" style="background:'+color+'"></div><span class="day-section__label" style="color:'+color+'">'+icon+' '+label+'</span></div>'+content+'</div>';
}
function VerseCard(verse,ref,light,color){
  return '<div class="verse-card glass"><p class="verse-card__text">&#8220;'+esc(verse)+'&#8221;</p><span class="verse-card__ref" style="color:'+color+'">'+esc(ref)+'</span></div>';
}
function PhraseCard(phrase,color){
  return '<div class="phrase-card" style="background:'+color+'"><div class="phrase-card__label">💎 Para no olvidar</div><p class="phrase-card__text">&#8220;'+esc(phrase)+'&#8221;</p></div>';
}
function SaveBox(id,label,placeholder,saved){
  return '<div class="save-box glass"><div class="save-box__header"><span class="save-box__label">'+label+'</span><span class="save-box__status" id="status-'+id+'">✓ Guardado</span></div><textarea class="save-textarea" id="field-'+id+'" placeholder="'+placeholder+'" data-field="'+id+'">'+esc(saved)+'</textarea></div>';
}

/* ════════════════════════════════════════════════════
   HOME
════════════════════════════════════════════════════ */
function renderHome(){
  const{done,total,pct}=getMonthProgress();
  const todayD=getCurrentDay(); const nextD=getNextIncompleteDay(); const feat=todayD||nextD;

  let todayHtml='';
  if(feat){
    const wk=WEEKS[feat.week];const isDone=completed.has(feat.day);const isToday=todayD&&feat.day===todayD.day;
    todayHtml='<div class="today-card glass" onclick="navigate(\'dia-'+feat.day+'\')"><div class="today-card__badge">'+wk.emoji+'</div><div style="flex:1"><div class="today-card__meta">'+(isToday?'🌸 Lectura de hoy':'📖 Siguiente pendiente')+'</div><div class="today-card__title">'+esc(feat.title)+'</div><div class="today-card__ref">Día '+feat.day+' · '+esc(feat.ref)+'</div><button class="btn btn--primary btn--sm" style="margin-top:14px">'+(isDone?'✓ Releer':'Leer ahora →')+'</button></div>'+(isDone?'<span style="font-size:24px;color:'+COL.done+'">✓</span>':'')+'</div>';
  }

  const today=new Date();const isJuly=today.getMonth()===6;const todayNum=isJuly?today.getDate():-1;
  let cal='<div class="calendar glass"><div class="calendar__header">'+DAY_NAMES.map(n=>'<div class="calendar__dname">'+n+'</div>').join('')+'</div>';
  CAL_GRID.forEach(row=>{
    cal+='<div class="calendar__row">';
    row.forEach(cell=>{
      if(!cell){cal+='<div class="calendar__cell is-empty"></div>';return;}
      const isPast=cell<10;const wk=wkOf(cell);const wCfg=WEEKS[wk];
      const isDone=completed.has(cell);const isT=cell===todayNum;
      let cls='calendar__cell'+(isPast?' is-past':isT?' is-today':isDone?' is-done':'');
      const act=!isPast?'onclick="navigate(\'dia-'+cell+'\')"':'';
      cal+='<div class="'+cls+'" '+act+'>';
      if(isT) cal+='<div class="calendar__num"><span class="today-num">'+cell+'</span></div>';
      else cal+='<div class="calendar__num'+(isPast?' grayed':'')+'">'+cell+'</div>';
      if(isPast) cal+='<div class="calendar__check">✓</div>';
      else cal+='<div class="calendar__bar" style="background:'+(isDone?wCfg.c:wCfg.c+'35')+'"></div>';
      cal+='</div>';
    });
    cal+='</div>';
  });
  cal+='</div>';

  const legend='<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:12px">'+Object.entries(WEEKS).map(([w,c])=>'<div style="display:flex;align-items:center;gap:6px;font-size:14px;color:#6A6A8A"><div style="width:10px;height:10px;border-radius:3px;background:'+c.c+'"></div>Sem '+w+'</div>').join('')+'</div>';

  const weekCards='<div class="weeks-grid">'+Object.entries(WEEKS).map(([w,wk])=>{
    const p=getWeekProgress(parseInt(w));
    return '<button class="week-card glass" onclick="navigate(\'semana-'+w+'\')">'
      +'<div style="display:flex;align-items:center;gap:14px"><div class="week-card__icon">'+wk.emoji+'</div>'
      +'<div style="flex:1;text-align:left"><div class="week-card__name">'+esc(wk.name)+'</div><div class="week-card__days">Días '+wk.days[0]+'–'+wk.days[wk.days.length-1]+'</div></div></div>'
      +ProgBar(p.done,p.total,wk.c)+'</button>';
  }).join('')+'</div>';

  return '<div class="page-enter">'
    +'<div class="hero"><div class="hero__inner">'
    +'<div class="hero__eyebrow">Caminando con Jesús · Julio 2026</div>'
    +'<h1 class="hero__title">Un mes de intimidad<br>con Dios</h1>'
    +'<div class="hero__subtitle">'+esc(MONTH_THEME)+'</div>'
    +'<div class="hero__verse">'+ANCHOR_VERSE+'<br><span style="font-size:14px;opacity:.6;font-family:Poppins,sans-serif;font-style:normal">'+ANCHOR_REF+'</span></div>'
    +'<div class="hero__prog-label"><span>Progreso del mes</span><strong>'+done+' / '+total+' · '+pct+'%</strong></div>'
    +'<div class="hero__prog-track"><div class="hero__prog-fill" style="width:'+pct+'%"></div></div>'
    +'</div></div>'
    +'<div class="container" style="padding-top:8px;padding-bottom:24px">'
    +todayHtml
    +'<div class="section-heading"><h3>Calendario julio</h3></div>'+cal+legend
    +'<div class="section-heading"><h3>Semanas temáticas</h3></div>'+weekCards
    +'<div class="footer-verse"><p>"El que comenzó la buena obra en ustedes la continuará."</p><small>— Filipenses 1:6 (NTV)</small></div>'
    +'</div></div>';
}

/* ════════════════════════════════════════════════════
   WEEK
════════════════════════════════════════════════════ */
function renderWeek(wNum){
  const wk=WEEKS[wNum];if(!wk)return renderHome();
  const wi=WI[wNum]||{};const wDays=DAYS.filter(d=>d.week===wNum);const prog=getWeekProgress(wNum);
  const dayList=wDays.map(d=>{
    const isDone=completed.has(d.day);
    return '<button class="day-list-item glass" onclick="navigate(\'dia-'+d.day+'\')">'
      +'<div class="day-list-item__badge" style="background:'+wk.c+'">'+d.day+'</div>'
      +'<div style="flex:1;text-align:left"><div class="day-list-item__title">'+esc(d.title)+'</div><div class="day-list-item__ref">'+esc(d.ref)+'</div></div>'
      +(isDone?'<span style="color:'+COL.done+';font-size:20px">✓</span>':'<span style="color:#C0B0C0;font-size:18px">›</span>')
      +'</button>';
  }).join('');

  return '<div class="page-enter">'
    +'<div class="week-hero" style="background:'+wk.c+'"><div class="week-hero__inner">'
    +Breadcrumb([{label:'Inicio',hash:'home'},{label:'Semana '+wNum,hash:'semana-'+wNum}])
    +'<div style="padding-top:10px"><div class="week-hero__eyebrow">Semana '+wNum+' · '+wk.emoji+'</div>'
    +'<h1 class="week-hero__title">'+esc(wk.name)+'</h1>'
    +'<div class="week-hero__range">Días '+wk.days[0]+' – '+wk.days[wk.days.length-1]+' de julio</div></div></div></div>'
    +'<div class="container" style="padding-top:24px;padding-bottom:48px">'
    +'<p style="font-size:18px;line-height:1.8;color:var(--text-mid)">'+esc(wi.text||'')+'</p>'
    +(wi.verse?'<div class="week-anchor glass" style="border-color:'+wk.c+'"><div class="week-anchor__label" style="color:'+wk.c+'">Versículo ancla</div><div class="week-anchor__verse">'+esc(wi.verse)+'</div><div class="week-anchor__ref">'+esc(wi.ref||'')+'</div></div>':'')
    +'<div class="section-heading"><h3>Progreso · '+prog.done+'/'+prog.total+'</h3></div>'+ProgBar(prog.done,prog.total,wk.c)
    +'<div class="day-list" style="margin-top:22px">'+dayList+'</div>'
    +'<div class="footer-verse"><p>'+ANCHOR_VERSE+'</p><small>— '+ANCHOR_REF+'</small></div>'
    +'</div></div>';
}

/* ════════════════════════════════════════════════════
   DAY
════════════════════════════════════════════════════ */
function renderDay(dNum){
  const day=DAYS.find(d=>d.day===dNum);if(!day)return renderHome();
  const wk=WEEKS[day.week];const idx=DAYS.indexOf(day);
  const prev=idx>0?DAYS[idx-1]:null; const next=idx<DAYS.length-1?DAYS[idx+1]:null;
  const isDone=completed.has(dNum);
  const navBtn=(d,lbl)=>d?'<button class="day-nav-btn" onclick="navigate(\'dia-'+d.day+'\')">'+lbl+'</button>':'<span style="flex:1"></span>';

  return '<div class="page-enter"><div class="container" style="padding-top:0;padding-bottom:64px">'
    +Breadcrumb([{label:'Inicio',hash:'home'},{label:wk.emoji+' '+wk.name,hash:'semana-'+day.week},{label:'Día '+dNum,hash:'dia-'+dNum}])
    +'<div class="day-header">'
    +'<div class="day-header__week" style="color:'+wk.c+'">'+wk.emoji+' '+esc(wk.name)+'</div>'
    +'<div class="day-header__num label">Día '+dNum+' · '+esc(day.date)+'</div>'
    +'<h1 class="day-title">'+esc(day.title)+'</h1>'
    +'<hr class="day-divider" style="background:linear-gradient(90deg,'+wk.c+',transparent)">'
    +'<div class="reading-pill glass">📖 Lectura sugerida: <strong>'+esc(day.reading||day.ref)+'</strong></div>'
    +'</div>'
    +VerseCard(day.verse,day.verseRef,wk.l,wk.c)
    +GlassSection('📜','Contexto histórico-bíblico',wk.c,paras(day.context))
    +GlassSection('✦','Enseñanza del día',wk.c,paras(day.teaching))
    +'<div class="application-box glass">'
    +'<div class="application-box__label" style="color:'+wk.c+'">→ Aplicación</div>'
    +'<p>'+esc(day.application)+'</p>'
    +'<div class="app-divider"></div>'
    +'<div class="save-box__header"><span class="save-box__label">✍ Mi aplicación</span><span class="save-box__status" id="status-app-'+dNum+'">✓ Guardado</span></div>'
    +'<textarea class="save-textarea" id="field-app-'+dNum+'" placeholder="¿Cómo vas a vivir esto hoy? ¿Qué pasos concretos darás?" data-field="app-'+dNum+'">'+esc(applications[dNum]||'')+'</textarea>'
    +'</div>'
    +SaveBox('note-'+dNum,'✏ Mis notas','Reflexiones personales, preguntas, lo que Dios te habló hoy...',notes[dNum]||'')
    +'<div class="day-section"><div class="day-section__header"><div class="day-section__bar" style="background:'+wk.c+'"></div><span class="day-section__label" style="color:'+wk.c+'">🙏 Oración</span></div><div class="prayer-box glass"><p>'+esc(day.prayer)+'</p></div></div>'
    +PhraseCard(day.phrase,wk.c)
    +'<button class="btn-complete" id="btn-complete-'+dNum+'" style="background:'+(isDone?COL.done:wk.c)+'" onclick="toggleComplete('+dNum+')">'+(isDone?'✓ Completado — toca para desmarcar':'Marcar como completado')+'</button>'
    +'<div class="day-nav">'+navBtn(prev,'← Día '+prev?.day)+'<button class="day-nav-btn day-nav-home" onclick="navigate(\'home\')">🏠</button>'+navBtn(next,'Día '+next?.day+' →')+'</div>'
    +'</div></div>';
}

/* ════════════════════════════════════════════════════
   PROGRESS
════════════════════════════════════════════════════ */
function renderProgress(){
  const{done,total,pct}=getMonthProgress(); const next=getNextIncompleteDay();
  const ws=Object.entries(WEEKS).map(([w,wk])=>{const p=getWeekProgress(parseInt(w));return'<div class="glass" style="border-radius:18px;padding:20px 22px;margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-size:17px;font-weight:600;color:var(--text)">'+wk.emoji+' '+esc(wk.name)+'</span><span style="font-size:15px;color:var(--text-light)">'+p.done+'/'+p.total+'</span></div>'+ProgBar(p.done,p.total,wk.c)+'</div>';}).join('');
  return '<div class="page-enter"><div class="container" style="padding-top:0;padding-bottom:64px">'
    +Breadcrumb([{label:'Inicio',hash:'home'},{label:'Mi progreso',hash:'progreso'}])
    +'<div style="padding-top:26px"><h2 style="margin-bottom:24px">Mi progreso — '+MONTH_NAME+'</h2>'
    +'<div class="progress-grid">'
    +'<div class="stat-card glass"><div class="stat-card__num" style="color:'+COL.done+'">'+done+'</div><div class="stat-card__label">Completados</div></div>'
    +'<div class="stat-card glass"><div class="stat-card__num" style="color:var(--burgundy)">'+(total-done)+'</div><div class="stat-card__label">Pendientes</div></div>'
    +'<div class="stat-card glass"><div class="stat-card__num" style="color:var(--silver)">'+pct+'%</div><div class="stat-card__label">Del mes</div></div>'
    +'</div>'
    +(currentUser?'<div class="glass" style="border-radius:14px;padding:14px 18px;margin-bottom:24px;font-size:15px;color:var(--text-mid)">☁️ Sincronizado con tu cuenta: <strong style="color:var(--lapis)">'+esc(currentUser.email)+'</strong></div>':'')
    +(next?'<div class="glass" style="border-radius:18px;padding:18px 22px;margin-bottom:28px;cursor:pointer" onclick="navigate(\'dia-'+next.day+'\')">'
      +'<div class="label" style="color:'+COL.primary+';margin-bottom:8px">Próxima lectura</div>'
      +'<div style="font-weight:600;font-size:17px;color:var(--text)">Día '+next.day+' · '+esc(next.title)+'</div>'
      +'<div style="font-size:15px;color:var(--text-light);margin-top:4px">'+esc(next.ref)+'</div></div>'
      :'<div class="glass" style="border-radius:18px;padding:18px 22px;margin-bottom:28px"><div style="font-weight:700;color:'+COL.done+';font-size:18px">🎉 ¡Mes completado!</div></div>')
    +'<div class="section-heading"><h3>Por semana</h3></div>'+ws+'</div></div></div>';
}

/* ════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════ */
function toggleComplete(dNum){
  if(completed.has(dNum))completed.delete(dNum);else completed.add(dNum);
  const btn=document.getElementById('btn-complete-'+dNum);
  const day=DAYS.find(d=>d.day===dNum);const wk=day?WEEKS[day.week]:null;
  if(btn){const d=completed.has(dNum);btn.style.background=d?COL.done:(wk?wk.c:COL.primary);btn.textContent=d?'✓ Completado — toca para desmarcar':'Marcar como completado';}
  saveLocal();scheduleSave();
}

document.addEventListener('input',function(e){
  const el=e.target; if(!el.matches('.save-textarea'))return;
  const field=el.dataset.field||el.id.replace('field-','');
  if(field.startsWith('app-')){const day=parseInt(field.replace('app-',''));applications[day]=el.value;}
  else if(field.startsWith('note-')){const day=parseInt(field.replace('note-',''));notes[day]=el.value;}
  const status=document.getElementById('status-'+field);
  if(status){status.textContent='✓ Guardado';status.style.opacity='1';clearTimeout(status._t);status._t=setTimeout(()=>{status.style.opacity='0';},2200);}
  saveLocal();scheduleSave();
});

function render(hash){
  hash=(hash||'home').replace(/^#/,'');
  const app=document.getElementById('app');
  const[page,param]=hash.split('-');const num=parseInt(param)||0;
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.toggle('active',el.dataset.page===hash||(el.dataset.page==='home'&&(hash==='home'||!hash))));
  if(hash==='home'||!hash){app.innerHTML=renderHome();return;}
  if(hash==='progreso'){app.innerHTML=renderProgress();return;}
  if(page==='dia'){app.innerHTML=renderDay(num);return;}
  if(page==='semana'){app.innerHTML=renderWeek(num);return;}
  app.innerHTML=renderHome();
}

window.addEventListener('DOMContentLoaded',function(){showLoading();updateNavUser();initFirebase();});
</script>
